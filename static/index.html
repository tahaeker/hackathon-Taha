<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sivas Lojistik Komuta Paneli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root {
  --bg-0: #f2f5fa;
  --bg-1: #e8edf6;
  --bg-2: #ffffff;
  --bg-3: #dde4ef;
  --bg-4: #c8d4e8;
  --line-soft: rgba(26, 46, 90, 0.05);
  --line: rgba(26, 46, 90, 0.10);
  --line-strong: rgba(26, 46, 90, 0.20);
  --text-0: #0f1e3c;
  --text-1: #1e3a6e;
  --text-2: #4a6285;
  --text-3: #7a95b5;
  --cyan: #0891b2;
  --cyan-soft: rgba(8, 145, 178, 0.10);
  --cyan-glow: rgba(8, 145, 178, 0.30);
  --amber: #d97706;
  --amber-soft: rgba(217, 119, 6, 0.12);
  --red: #dc2626;
  --red-soft: rgba(220, 38, 38, 0.10);
  --lime: #16a34a;
  --lime-soft: rgba(22, 163, 74, 0.10);
  --violet: #7c3aed;
  --font-ui: 'Inter Tight', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', monospace;
  --fs-xs: 10px; --fs-sm: 11px; --fs-md: 13px; --fs-lg: 15px;
  --fs-xl: 18px; --fs-2xl: 24px; --fs-3xl: 36px; --fs-4xl: 52px;
  --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
  --space-5: 20px; --space-6: 24px; --space-8: 32px;
  --radius-sm: 4px; --radius-md: 6px; --radius-lg: 10px;
  --shadow-panel: 0 1px 0 rgba(255,255,255,0.02) inset, 0 24px 48px -24px rgba(0,0,0,0.7);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg-0); color: var(--text-1);
  font-family: var(--font-ui); font-size: var(--fs-md); line-height: 1.4;
  -webkit-font-smoothing: antialiased; font-feature-settings: 'ss01', 'cv11'; letter-spacing: -0.005em; }
#root { width: 100vw; min-height: 100vh; }
.mono { font-family: var(--font-mono); font-feature-settings: 'ss02', 'zero'; letter-spacing: 0; }
.upper { text-transform: uppercase; letter-spacing: 0.08em; font-size: var(--fs-xs); color: var(--text-2); font-weight: 500; }
.num { font-variant-numeric: tabular-nums; font-family: var(--font-mono); }
button { font-family: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
button:focus-visible { outline: 1px solid var(--cyan); outline-offset: 2px; }
.app { display: grid; grid-template-rows: 52px 1fr 36px; height: 100vh; overflow: hidden;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(93,214,230,0.03), transparent 60%),
    radial-gradient(ellipse 40% 30% at 20% 100%, rgba(93,214,230,0.02), transparent 50%),
    var(--bg-0); }

/* ── TOPBAR ── */
.topbar { display: flex; align-items: center; gap: var(--space-5); padding: 0 var(--space-5);
  border-bottom: 1px solid var(--line); background: rgba(14,22,40,0.96); backdrop-filter: blur(10px); }
.topbar .brand { display: flex; align-items: center; gap: var(--space-3); font-weight: 600; color: var(--text-0); font-size: var(--fs-md); }
.topbar .brand .mark { width: 22px; height: 22px; border-radius: 5px;
  background: linear-gradient(135deg, var(--cyan) 0%, #1e6b7a 100%); position: relative;
  box-shadow: 0 0 0 1px rgba(93,214,230,0.3), 0 0 14px var(--cyan-glow); }
.topbar .brand .mark::after { content: ''; position: absolute; inset: 5px;
  border: 1.5px solid rgba(11,17,32,0.7); border-radius: 2px; border-right-color: transparent; border-bottom-color: transparent; }
.topbar .brand .sub { color: var(--text-2); font-weight: 400; margin-left: var(--space-2); }
.topbar nav { display: flex; gap: 2px; margin-left: var(--space-6); }
.topbar nav button { padding: 6px 12px; border-radius: var(--radius-sm); color: var(--text-2); font-size: var(--fs-md); font-weight: 500; transition: all 0.12s; }
.topbar nav button.active { color: var(--text-0); background: var(--bg-3); }
.topbar nav button:hover:not(.active) { color: var(--text-1); background: var(--bg-2); }
.topbar .spacer { flex: 1; }
.topbar .status-chips { display: flex; gap: var(--space-3); align-items: center; }
.topbar .chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px;
  background: var(--bg-2); border: 1px solid var(--line); font-size: var(--fs-sm); color: var(--text-1); }
.topbar .chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--lime); box-shadow: 0 0 6px var(--lime); }
.topbar .chip.warning .dot { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
.topbar .chip.critical .dot { background: var(--red); box-shadow: 0 0 6px var(--red); animation: pulse 1.6s infinite; }
.topbar .chip.info .dot { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
@keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.35 } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.topbar .clock { font-family: var(--font-mono); color: var(--text-0); font-size: var(--fs-md); }
.topbar .clock .tz { color: var(--text-3); margin-left: 6px; font-size: var(--fs-sm); }

/* ── LAYOUT ── */
.main { display: grid; grid-template-columns: 340px 1fr 400px; gap: 1px; background: var(--line); overflow: hidden; }
.main.wide-map { grid-template-columns: 300px 1fr 380px; }
.pane { background: linear-gradient(180deg, rgba(25,38,56,0.5), rgba(14,22,40,0.88));
  backdrop-filter: blur(18px) saturate(1.15); -webkit-backdrop-filter: blur(18px) saturate(1.15);
  overflow: hidden; display: flex; flex-direction: column; min-height: 0;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), inset -1px 0 0 rgba(255,255,255,0.02); }
.glass { background: rgba(25,38,56,0.5); backdrop-filter: blur(14px) saturate(1.2);
  -webkit-backdrop-filter: blur(14px) saturate(1.2); border: 1px solid rgba(148,178,214,0.11);
  border-radius: var(--radius-md); box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 10px 30px -12px rgba(0,0,0,0.7); }
.pane-header { display: flex; align-items: center; justify-content: space-between;
  padding: 10px var(--space-4); border-bottom: 1px solid var(--line); flex-shrink: 0; }
.pane-header h3 { margin: 0; font-size: var(--fs-md); color: var(--text-0); font-weight: 600; letter-spacing: -0.01em; }
.pane-header .count { color: var(--text-3); font-family: var(--font-mono); font-size: var(--fs-sm); margin-left: 8px; }
.pane-body { flex: 1; overflow-y: auto; overflow-x: hidden; }
.pane-body::-webkit-scrollbar { width: 8px; }
.pane-body::-webkit-scrollbar-track { background: transparent; }
.pane-body::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 4px; }
.pane-body::-webkit-scrollbar-thumb:hover { background: var(--bg-4); }
.footer { display: flex; align-items: center; gap: var(--space-5); padding: 0 var(--space-4);
  border-top: 1px solid var(--line); background: rgba(14,22,40,0.96); font-size: var(--fs-sm); color: var(--text-2); }
.footer .k { color: var(--text-3); margin-right: 6px; }
.footer .v { color: var(--text-1); font-family: var(--font-mono); }
.footer .sep { width: 1px; height: 14px; background: var(--line); }
.footer .right { margin-left: auto; display: flex; gap: var(--space-5); align-items: center; }

/* ── BADGES ── */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px; border-radius: 3px;
  font-size: var(--fs-xs); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; font-family: var(--font-mono); }
.badge.critical { background: var(--red-soft); color: var(--red); }
.badge.warning { background: var(--amber-soft); color: var(--amber); }
.badge.ok { background: var(--lime-soft); color: var(--lime); }
.badge.info { background: var(--cyan-soft); color: var(--cyan); }
.badge.muted { background: var(--bg-3); color: var(--text-2); }
.divider { height: 1px; background: var(--line); margin: var(--space-4) 0; }
.divider-soft { height: 1px; background: var(--line-soft); margin: var(--space-3) 0; }

/* ── ROUTE CARDS ── */
.route-card { position: relative; padding: 12px 16px; border-bottom: 1px solid var(--line-soft); cursor: pointer; transition: background 0.12s; }
.route-card:hover { background: rgba(31,47,68,0.6); }
.route-card.selected { background: rgba(31,47,68,0.8); }
.route-card.selected::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
  background: var(--cyan); box-shadow: 0 0 10px var(--cyan-glow); }
.route-card .row-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.route-card .route-id { font-family: var(--font-mono); font-size: var(--fs-md); color: var(--text-0); font-weight: 500; }
.route-card .vehicle { font-size: var(--fs-sm); color: var(--text-2); display: flex; align-items: center; gap: 6px; }
.route-card .row-metrics { display: flex; gap: 12px; font-size: var(--fs-sm); margin-top: 8px; }
.route-card .row-metrics .m .k { color: var(--text-3); font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 2px; }
.route-card .row-metrics .m .v { font-family: var(--font-mono); color: var(--text-1); }
.route-card .row-metrics .m .v.critical { color: var(--red); }
.route-card .row-metrics .m .v.warning { color: var(--amber); }
.route-card .row-metrics .m .v.ok { color: var(--lime); }
.route-card .progress { margin-top: 10px; height: 3px; background: var(--bg-3); border-radius: 2px; overflow: hidden; position: relative; }
.route-card .progress .fill { height: 100%; background: var(--cyan); box-shadow: 0 0 6px var(--cyan-glow); }
.route-card .progress .fill.warning { background: var(--amber); box-shadow: 0 0 6px rgba(245,185,69,0.4); }
.route-card .progress .fill.critical { background: var(--red); box-shadow: 0 0 6px rgba(255,107,107,0.4); }
.route-card .progress .fill.ok { background: var(--lime); box-shadow: 0 0 6px rgba(142,230,138,0.4); }
.filters { display: flex; gap: 4px; padding: 10px 12px; border-bottom: 1px solid var(--line-soft); flex-wrap: wrap; }
.filters .f { padding: 4px 9px; border-radius: var(--radius-sm); background: var(--bg-2); border: 1px solid var(--line);
  font-size: var(--fs-sm); color: var(--text-2); cursor: pointer; transition: all 0.12s; font-family: var(--font-mono); }
.filters .f:hover { color: var(--text-1); border-color: var(--line-strong); }
.filters .f.active { color: var(--bg-0); background: var(--cyan); border-color: var(--cyan); font-weight: 600; }

/* ── MAP — COMMAND SPHERE (Fisheye HUD) ── */
/* The map itself stays a flat rectangle (Leaflet requires this).
   The SPHERE ILLUSION comes from:
     - circular mask (border-radius: 50% + overflow: hidden)
     - inset cyan glow (inner atmosphere)
     - radial gradient vignette (fisheye lens darkening)
     - rotating dashed HUD rings around the sphere
     - very subtle perspective rotateY for 3D feel (no rotateX — doesn't break tiles) */
.map-sphere-stage { position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background:
    radial-gradient(ellipse 65% 45% at 50% 50%, rgba(93,214,230,0.04), transparent 70%),
    radial-gradient(ellipse 40% 30% at 20% 80%, rgba(167,139,250,0.025), transparent 70%),
    #05080f;
  overflow: hidden; }
.map-sphere-container {
  position: relative;
  width: min(92%, 92vh);
  aspect-ratio: 1 / 1;
  max-width: 100%;
  transform: perspective(1400px) rotateY(2deg);
  transition: transform 0.6s ease; }
.map-sphere-stage:hover .map-sphere-container { transform: perspective(1400px) rotateY(0deg) scale(1.01); }
.map-sphere {
  position: absolute; inset: 0;
  border-radius: 50%;
  overflow: hidden;
  box-shadow:
    inset 0 0 60px rgba(93,214,230,0.28),
    inset 0 0 140px rgba(93,214,230,0.12),
    inset 0 0 0 2px rgba(93,214,230,0.45),
    0 0 0 1px rgba(93,214,230,0.15),
    0 0 80px rgba(93,214,230,0.22),
    0 20px 80px rgba(0,0,0,0.85); }
.map-el { width: 100%; height: 100%; background: #0a1018; }
/* Fisheye vignette — darkens edges, bright center */
.map-fisheye {
  position: absolute; inset: 0;
  pointer-events: none;
  border-radius: 50%;
  background:
    radial-gradient(circle at 50% 48%,
      transparent 0%,
      transparent 40%,
      rgba(11,17,32,0.12) 62%,
      rgba(11,17,32,0.42) 82%,
      rgba(11,17,32,0.75) 96%,
      rgba(5,8,15,0.92) 100%);
  z-index: 410; }
/* Subtle specular highlight — top-left sphere sheen */
.map-sheen {
  position: absolute; inset: 0;
  pointer-events: none;
  border-radius: 50%;
  background: radial-gradient(ellipse 40% 28% at 32% 22%,
    rgba(255,255,255,0.06) 0%, transparent 60%);
  z-index: 411;
  mix-blend-mode: screen; }
/* Dashed HUD rings — concentric, rotating */
.map-hud-ring {
  position: absolute;
  border: 1px dashed rgba(93,214,230,0.28);
  border-radius: 50%;
  pointer-events: none;
  animation: rotate-cw 80s linear infinite; }
.map-hud-ring.r1 { inset: -3%; }
.map-hud-ring.r2 { inset: -8%; border-color: rgba(93,214,230,0.18); animation: rotate-ccw 120s linear infinite; border-style: dotted; }
.map-hud-ring.r3 { inset: -14%; border-color: rgba(93,214,230,0.1); animation: rotate-cw 180s linear infinite; }
.map-hud-ring.r4 { inset: -20%; border-color: rgba(93,214,230,0.06); border-style: dashed; animation: rotate-ccw 240s linear infinite; }
@keyframes rotate-cw  { from { transform: rotate(0); } to { transform: rotate(360deg); } }
@keyframes rotate-ccw { from { transform: rotate(0); } to { transform: rotate(-360deg); } }
/* Coordinate tick marks around the sphere */
.map-sphere-ticks {
  position: absolute; inset: -2%;
  pointer-events: none;
  border-radius: 50%; }
.map-sphere-ticks::before, .map-sphere-ticks::after {
  content: ''; position: absolute; left: 50%; width: 1px; height: 8px;
  background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
.map-sphere-ticks::before { top: -4px; transform: translateX(-50%); }
.map-sphere-ticks::after  { bottom: -4px; transform: translateX(-50%); }
/* Cardinal labels — N/E/S/W orbital */
.map-cardinal { position: absolute; font-family: var(--font-mono); font-size: 10px;
  font-weight: 600; color: var(--cyan); text-shadow: 0 0 6px var(--cyan-glow);
  letter-spacing: 0.15em; pointer-events: none; z-index: 420; }
.map-cardinal.n { top: -22px; left: 50%; transform: translateX(-50%); }
.map-cardinal.s { bottom: -22px; left: 50%; transform: translateX(-50%); }
.map-cardinal.e { right: -22px; top: 50%; transform: translateY(-50%) rotate(90deg); }
.map-cardinal.w { left: -22px; top: 50%; transform: translateY(-50%) rotate(-90deg); }
/* Orbital coordinate text */
.map-orbital-text {
  position: absolute; inset: -6%;
  pointer-events: none; z-index: 415;
  animation: rotate-cw 180s linear infinite; }
.map-orbital-text svg { width: 100%; height: 100%; }
.map-orbital-text text { fill: rgba(93,214,230,0.45); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; }
/* Leaflet overrides — dark satellite style */
.leaflet-container { background: #0a1018 !important; font-family: var(--font-ui) !important; }
.leaflet-tile-pane { filter: brightness(0.88) saturate(0.75) contrast(1.1); }
.leaflet-control-attribution { display: none; }
/* HUD Grid overlay */
.map-hud-grid {
  position: absolute; inset: 0; pointer-events: none; z-index: 400;
  background-image:
    linear-gradient(rgba(93,214,230,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(93,214,230,0.05) 1px, transparent 1px);
  background-size: 44px 44px;
  mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black 40%, transparent 100%);
  -webkit-mask-image: radial-gradient(ellipse 90% 80% at 50% 50%, black 40%, transparent 100%); }
/* Scan line sweep */
.map-scan-line {
  position: absolute; left: 0; right: 0; height: 2px; pointer-events: none; z-index: 401;
  background: linear-gradient(90deg, transparent, rgba(93,214,230,0.4), transparent);
  animation: scanLine 4s linear infinite; }
@keyframes scanLine { 0% { top: 0; opacity: 0.8; } 80% { opacity: 0.8; } 100% { top: 100%; opacity: 0; } }

/* Map overlay panels */
.map-wrap { position: relative; width: 100%; height: 100%;
  min-height: 400px; background: #0a1018; overflow: hidden; }
/* Ensure Leaflet panes sit below overlays but above background */
.leaflet-pane { z-index: 100; }
.leaflet-top, .leaflet-bottom { z-index: 200; }
.map-overlay-tl { position: absolute; top: 12px; left: 12px; display: flex; flex-direction: column; gap: 6px; z-index: 500; }
.map-overlay-tr { position: absolute; top: 12px; right: 12px; display: flex; flex-direction: column; gap: 6px; z-index: 500; align-items: flex-end; }
.map-overlay-bl { position: absolute; bottom: 12px; left: 12px; display: flex; flex-direction: column; gap: 8px; z-index: 500; }
.map-overlay-br { position: absolute; bottom: 12px; right: 12px; z-index: 500; }
.map-btn { background: rgba(19,30,48,0.75); backdrop-filter: blur(14px) saturate(1.2);
  -webkit-backdrop-filter: blur(14px) saturate(1.2); border: 1px solid rgba(148,178,214,0.18);
  box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset, 0 4px 14px -4px rgba(0,0,0,0.6);
  width: 30px; height: 30px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center;
  color: var(--text-1); cursor: pointer; transition: all 0.12s; font-size: 14px; }
.map-btn:hover { border-color: var(--line-strong); color: var(--text-0); background: rgba(31,47,68,0.85); }
.map-btn.active { background: var(--cyan-soft); border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 8px var(--cyan-glow); }
.map-layer-toggle { background: rgba(19,30,48,0.75); backdrop-filter: blur(14px) saturate(1.2);
  -webkit-backdrop-filter: blur(14px) saturate(1.2); border: 1px solid rgba(148,178,214,0.15); border-radius: var(--radius-md);
  box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 4px 14px -4px rgba(0,0,0,0.6);
  padding: 6px 10px; display: flex; align-items: center; gap: 10px; font-size: var(--fs-sm); }
.map-layer-toggle .toggle-item { display: flex; align-items: center; gap: 5px; cursor: pointer; color: var(--text-2); }
.map-layer-toggle .toggle-item.on { color: var(--text-0); }
.map-layer-toggle .dot { width: 7px; height: 7px; border-radius: 2px; }
.map-legend { background: rgba(19,30,48,0.75); backdrop-filter: blur(14px) saturate(1.2);
  -webkit-backdrop-filter: blur(14px) saturate(1.2); border: 1px solid rgba(148,178,214,0.15); border-radius: var(--radius-md);
  box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 6px 18px -6px rgba(0,0,0,0.6);
  padding: 10px 12px; font-size: var(--fs-sm); min-width: 180px; }
.map-legend .title { color: var(--text-3); font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.map-legend .li { display: flex; align-items: center; gap: 8px; color: var(--text-1); margin-bottom: 3px; }
.map-legend .swatch { width: 14px; height: 3px; border-radius: 2px; }
.map-hud { background: rgba(19,30,48,0.75); backdrop-filter: blur(14px) saturate(1.2);
  -webkit-backdrop-filter: blur(14px) saturate(1.2); border: 1px solid rgba(148,178,214,0.15); border-radius: var(--radius-md);
  box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 4px 14px -4px rgba(0,0,0,0.6);
  padding: 8px 12px; font-size: var(--fs-sm); font-family: var(--font-mono); }
.map-hud .k { color: var(--text-3); margin-right: 6px; }
.map-hud .v { color: var(--text-0); }
.map-coords { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--text-3);
  background: rgba(11,17,32,0.7); padding: 3px 8px; border-radius: 3px; z-index: 500; border: 1px solid var(--line-soft); }
.map-tooltip { position: absolute; z-index: 600; background: rgba(7,11,17,0.97); backdrop-filter: blur(10px);
  border: 1px solid var(--line-strong); border-radius: var(--radius-md); padding: 10px 12px;
  font-size: var(--fs-sm); pointer-events: none; min-width: 200px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
.map-tooltip .tt-title { color: var(--text-0); font-weight: 600; margin-bottom: 4px; display: flex; justify-content: space-between; }
.map-tooltip .tt-row { display: flex; justify-content: space-between; gap: 12px; margin: 2px 0; }
.map-tooltip .tt-row .k { color: var(--text-3); }
.map-tooltip .tt-row .v { color: var(--text-1); font-family: var(--font-mono); }

/* ── LEAFLET STOP MARKERS ── */
.lf-stop-marker { pointer-events: all; cursor: pointer; }
.lf-stop-pin {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;

.lf-stop-pin.ok { background: rgba(7,11,17,0.92); border-color: #8ee68a; color: #8ee68a; }
.lf-stop-pin.miss { background: rgba(7,11,17,0.92); border-color: #ff6b6b; color: #ff6b6b; }
.lf-stop-pin:hover { transform: scale(1.25); }
.lf-stop-badge {
  position: absolute; top: -22px; left: 50%; transform: translateX(-50%);

  padding: 2px 6px; white-space: nowrap;

.lf-stop-badge.risk-high { border-color: rgba(255,107,107,0.4); color: var(--red); }
.lf-stop-badge.risk-med { border-color: rgba(245,185,69,0.4); color: var(--amber); }
.lf-stop-badge.risk-low { border-color: rgba(93,214,230,0.3); color: var(--cyan); }
.lf-depot-marker {
  width: 20px; height: 20px; background: var(--cyan);

.lf-miss-alert {
  position: absolute; top: -8px; right: -8px;
  width: 14px; height: 14px; background: #ff6b6b; color: #0B1120;
  border-radius: 50%; font-size: 9px; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px solid #0B1120;
  box-shadow: 0 0 10px #ff6b6b;

/* Leaflet tooltip dark override */
.leaflet-tooltip.lf-tip {
  background: rgba(7,11,17,0.96); color: var(--text-1);
  border: 1px solid var(--line-strong); border-radius: 4px;

  padding: 6px 9px; }
.leaflet-tooltip.lf-tip::before { border-top-color: rgba(7,11,17,0.96) !important; }

/* ── DETAIL + 3D COMPARISON CARDS ── */
.detail-head { padding: var(--space-4); border-bottom: 1px solid var(--line); }
.detail-head .route-title { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.detail-head .rid { font-family: var(--font-mono); font-size: var(--fs-xl); color: var(--text-0); font-weight: 600; letter-spacing: -0.01em; }
.detail-head .rid .sub { color: var(--text-3); font-size: var(--fs-sm); margin-left: 8px; font-weight: 400; }

/* 3D CARD CONTAINER */
.comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px;
  perspective: 900px; perspective-origin: 50% 50%; }
.comparison .col {
  background: rgba(19,30,48,0.6);
  backdrop-filter: blur(20px) saturate(1.3);
  -webkit-backdrop-filter: blur(20px) saturate(1.3);
  border: 1px solid rgba(148,178,214,0.13);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.06) inset,
    0 12px 28px -10px rgba(0,0,0,0.7),
    0 0 0 1px rgba(148,178,214,0.04) inset;
  transform: rotateX(3deg) translateZ(0);
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease; }
.comparison .col:hover {
  transform: rotateX(-1deg) translateY(-4px) translateZ(12px) scale(1.01);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.08) inset,
    0 20px 40px -12px rgba(0,0,0,0.8),
    0 0 0 1px rgba(148,178,214,0.08) inset; }
.comparison .col .label { font-size: var(--fs-xs); color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.comparison .col .big { font-family: var(--font-mono); font-size: var(--fs-2xl); color: var(--text-0); font-weight: 500; letter-spacing: -0.02em; }
.comparison .col .unit { color: var(--text-3); font-size: var(--fs-sm); margin-left: 2px; }
.comparison .col.optimized {
  background: linear-gradient(145deg, rgba(93,214,230,0.12) 0%, rgba(19,30,48,0.6) 60%);
  border-color: rgba(93,214,230,0.28);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.07) inset,
    0 0 0 1px rgba(93,214,230,0.12) inset,
    0 12px 32px -10px rgba(93,214,230,0.3),
    0 0 24px -8px rgba(93,214,230,0.2); }
.comparison .col.optimized .big { color: var(--cyan); text-shadow: 0 0 20px var(--cyan-glow), 0 0 40px rgba(93,214,230,0.15); }
.comparison .col.optimized:hover {
  box-shadow:
    0 1px 0 rgba(255,255,255,0.1) inset,
    0 0 0 1px rgba(93,214,230,0.2) inset,
    0 20px 48px -12px rgba(93,214,230,0.4),
    0 0 32px -6px rgba(93,214,230,0.25); }
.delta-banner { margin-top: 10px; padding: 10px 12px; background: rgba(142,230,138,0.08);
  border: 1px solid rgba(142,230,138,0.25); border-radius: var(--radius-md);
  display: flex; align-items: center; gap: 10px; font-size: var(--fs-md); color: var(--text-0); }
.delta-banner .arrow { color: var(--lime); font-family: var(--font-mono); font-weight: 700; }
.delta-banner .metric { font-family: var(--font-mono); color: var(--lime); font-weight: 600; }

/* ── TACTICAL SLATE BUTTONS ── */
.actions { display: flex; gap: 8px; padding: 12px var(--space-4); border-bottom: 1px solid var(--line); }
.btn { flex: 1; padding: 8px 12px; border-radius: var(--radius-sm); font-size: var(--fs-md); font-weight: 500;
  transition: all 0.15s; text-align: center; border: 1px solid transparent; letter-spacing: 0.01em; }
.btn-primary {
  background: linear-gradient(135deg, var(--cyan) 0%, #3ab8ca 100%);
  color: #080e1a;
  box-shadow: 0 0 0 1px rgba(93,214,230,0.3), 0 4px 12px rgba(93,214,230,0.25); }
.btn-primary:hover {
  background: linear-gradient(135deg, #7ee3f0 0%, var(--cyan) 100%);
  box-shadow: 0 0 0 1px rgba(93,214,230,0.5), 0 6px 18px rgba(93,214,230,0.35); }
.btn-ghost {
  border-color: rgba(148,178,214,0.2);
  color: var(--text-1);
  background: linear-gradient(135deg, rgba(25,38,56,0.8), rgba(19,30,48,0.6)); }
.btn-ghost:hover { border-color: rgba(148,178,214,0.35); color: var(--text-0); background: rgba(31,47,68,0.7); }

/* ── EFFICIENCY GAIN WIDGET ── */
.efficiency-widget {
  position: absolute; top: 12px; right: 12px; z-index: 550;
  background: linear-gradient(135deg, rgba(93,214,230,0.14) 0%, rgba(19,30,48,0.85) 60%);
  backdrop-filter: blur(16px) saturate(1.3);
  -webkit-backdrop-filter: blur(16px) saturate(1.3);
  border: 1px solid rgba(93,214,230,0.3);
  border-radius: var(--radius-lg);
  padding: 10px 16px 10px 14px;
  min-width: 168px;
  box-shadow:
    0 0 0 1px rgba(93,214,230,0.1) inset,
    0 0 24px -6px rgba(93,214,230,0.35),
    0 8px 24px -8px rgba(0,0,0,0.7);
  animation: fadeIn 0.5s ease both; }
.efficiency-widget .ew-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--cyan); opacity: 0.8; margin-bottom: 3px; font-family: var(--font-mono); }
.efficiency-widget .ew-main { display: flex; align-items: baseline; gap: 3px; }
.efficiency-widget .ew-num { font-family: var(--font-mono); font-size: 28px; font-weight: 600;
  color: var(--cyan); text-shadow: 0 0 20px var(--cyan-glow), 0 0 40px rgba(93,214,230,0.15);
  letter-spacing: -0.03em; line-height: 1; }
.efficiency-widget .ew-unit { font-family: var(--font-mono); font-size: var(--fs-sm); color: var(--text-2); }
.efficiency-widget .ew-sub { font-size: var(--fs-xs); color: var(--lime); margin-top: 3px; font-family: var(--font-mono); }
.efficiency-widget .ew-sub2 { font-size: 9px; color: var(--text-3); margin-top: 1px; font-family: var(--font-mono); }
.efficiency-widget .ew-pulse { width: 6px; height: 6px; background: var(--cyan); border-radius: 50%;
  box-shadow: 0 0 6px var(--cyan); display: inline-block; margin-right: 4px;
  animation: pulse 1.8s infinite; }

/* ── TIMELINE / GANTT ── */
.timeline { padding: var(--space-4); }
.timeline-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.timeline-head .tabs { display: flex; gap: 2px; background: var(--bg-2); border-radius: var(--radius-sm); padding: 2px; }
.timeline-head .tabs button { padding: 4px 10px; border-radius: 3px; font-size: var(--fs-sm); color: var(--text-2); font-weight: 500; }
.timeline-head .tabs button.active { background: var(--bg-4); color: var(--text-0); }
.gantt { display: flex; flex-direction: column; gap: 3px; }
.gantt-row { display: grid; grid-template-columns: 60px 1fr 55px; align-items: center; gap: 8px; padding: 4px 0; font-size: var(--fs-sm); }
.gantt-row:hover { background: rgba(31,47,68,0.4); }
.gantt-row .label { font-family: var(--font-mono); color: var(--text-2); font-size: var(--fs-xs); }
.gantt-row .track { position: relative; height: 16px; background: var(--bg-2); border-radius: 3px; overflow: hidden; }
.gantt-row .window { position: absolute; top: 0; bottom: 0; background: var(--cyan-soft); border-left: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }
.gantt-row .bar { position: absolute; top: 3px; height: 10px; border-radius: 2px; background: var(--text-2); }
.gantt-row .bar.ok { background: var(--lime); box-shadow: 0 0 4px rgba(142,230,138,0.4); }
.gantt-row .bar.miss { background: var(--red); box-shadow: 0 0 4px rgba(255,107,107,0.4); }
.gantt-row .delay { font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--text-3); text-align: right; }
.gantt-row .delay.miss { color: var(--red); }
.gantt-row .delay.ok { color: var(--text-2); }
.gantt-axis { display: grid; grid-template-columns: 60px 1fr 55px; gap: 8px; margin-bottom: 6px; font-size: var(--fs-xs); color: var(--text-3); font-family: var(--font-mono); }
.gantt-axis .ticks { display: flex; justify-content: space-between; }

/* ── STOPS LIST ── */
.stops-list { padding: 0 var(--space-4) var(--space-4); }
.stop-row { display: grid; grid-template-columns: 24px 1fr auto; gap: 10px; padding: 10px 0;
  border-bottom: 1px solid var(--line-soft); align-items: center; }
.stop-row:last-child { border-bottom: 0; }
.stop-row .seq { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: var(--fs-xs); font-weight: 700; border: 1px solid var(--line); }
.stop-row .seq.ok { border-color: var(--lime); color: var(--lime); background: var(--lime-soft); }
.stop-row .seq.miss { border-color: var(--red); color: var(--red); background: var(--red-soft); }
.stop-row .main-info .sid { color: var(--text-0); font-family: var(--font-mono); font-size: var(--fs-md); }
.stop-row .main-info .meta { font-size: var(--fs-xs); color: var(--text-3); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }
.stop-row .main-info .cond-pill { padding: 1px 6px; border-radius: 2px; font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
.stop-row .arrival { font-family: var(--font-mono); font-size: var(--fs-md); color: var(--text-1); }
.stop-row .arrival .delta { font-size: var(--fs-xs); color: var(--text-3); margin-left: 4px; }
.cond-pill.snow { background: rgba(93,214,230,0.16); color: var(--cyan); }
.cond-pill.icy { background: rgba(167,139,250,0.16); color: var(--violet); }
.cond-pill.wet { background: rgba(93,214,230,0.1); color: #88c4d6; }
.cond-pill.dry { background: var(--bg-3); color: var(--text-2); }
.cond-pill.snow_covered { background: rgba(93,214,230,0.2); color: var(--cyan); }
.cond-pill.fog { background: rgba(167,139,250,0.12); color: var(--violet); }
.cond-pill.rain { background: rgba(93,214,230,0.1); color: #88c4d6; }
.cond-pill.clear { background: var(--bg-3); color: var(--text-2); }

/* ── TWEAKS PANEL ── */
.tweaks-panel { position: fixed; bottom: 50px; right: 16px; z-index: 900; width: 280px;
  background: rgba(14,22,40,0.97); border: 1px solid var(--line-strong); border-radius: var(--radius-lg);
  box-shadow: 0 20px 48px rgba(0,0,0,0.7); overflow: hidden; backdrop-filter: blur(16px); }
.tweaks-panel .tp-head { padding: 10px 14px; border-bottom: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: center; background: var(--bg-2); }
.tweaks-panel .tp-head h4 { margin: 0; font-size: var(--fs-md); color: var(--text-0); font-weight: 600; }
.tweaks-panel .tp-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 12px; }
.tp-group .tp-label { font-size: var(--fs-xs); color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }
.tp-seg { display: flex; background: var(--bg-2); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 2px; }
.tp-seg button { flex: 1; padding: 5px 8px; border-radius: 3px; font-size: var(--fs-sm); color: var(--text-2); }
.tp-seg button.active { background: var(--bg-4); color: var(--text-0); }

/* ── MODEL CARD ── */
.model-card { padding: var(--space-4); border-top: 1px solid var(--line); }
.model-card h4 { margin: 0 0 8px; font-size: var(--fs-md); color: var(--text-0); font-weight: 600; }
.model-card .ai-dot { width: 6px; height: 6px; background: var(--cyan); border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 6px var(--cyan); }
.feat-bar { display: grid; grid-template-columns: 140px 1fr 40px; gap: 8px; align-items: center; font-size: var(--fs-xs); margin: 4px 0; }
.feat-bar .fn { color: var(--text-2); font-family: var(--font-mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.feat-bar .fb { height: 4px; background: var(--bg-3); border-radius: 2px; overflow: hidden; }
.feat-bar .fb .fill { height: 100%; background: var(--cyan); }
.feat-bar .fv { color: var(--text-1); font-family: var(--font-mono); text-align: right; }

/* ── ALERTS ── */
.alert-item { display: flex; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--line-soft); cursor: pointer; transition: background 0.12s; }
.alert-item:hover { background: rgba(31,47,68,0.5); }
.alert-item .pin { width: 4px; align-self: stretch; border-radius: 2px; }
.alert-item.critical .pin { background: var(--red); box-shadow: 0 0 6px var(--red); }
.alert-item.warning .pin { background: var(--amber); box-shadow: 0 0 4px var(--amber); }
.alert-item .body { flex: 1; min-width: 0; }
.alert-item .body .title { color: var(--text-0); font-size: var(--fs-md); font-weight: 500; margin-bottom: 2px; }
.alert-item .body .desc { color: var(--text-2); font-size: var(--fs-sm); }
.alert-item .body .meta { color: var(--text-3); font-size: var(--fs-xs); margin-top: 3px; font-family: var(--font-mono); }
.alert-item .time { color: var(--text-3); font-family: var(--font-mono); font-size: var(--fs-xs); white-space: nowrap; }

/* ── KPI STRIP ── */
.kpi-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--line); border-bottom: 1px solid var(--line); }
.kpi-strip .kpi { background: rgba(14,22,40,0.9); padding: 10px 14px; }
.kpi-strip .kpi .k { font-size: var(--fs-xs); color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
.kpi-strip .kpi .v { font-family: var(--font-mono); font-size: var(--fs-xl); color: var(--text-0); font-weight: 500; letter-spacing: -0.02em; }
.kpi-strip .kpi .v .unit { color: var(--text-3); font-size: var(--fs-sm); margin-left: 2px; }
.kpi-strip .kpi .trend { font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--lime); margin-top: 2px; }
.kpi-strip .kpi .trend.down { color: var(--red); }
.spark { display: inline-block; vertical-align: middle; }

/* ══════════════════════════════════════════════════════
   ENTERPRISE LIGHT THEME — hardcoded dark color overrides
   ══════════════════════════════════════════════════════ */
html, body { background: var(--bg-0); color: var(--text-1); }
.app {
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(8,145,178,0.05), transparent 55%),

}

}

.topbar .chip { background: var(--bg-1); border-color: var(--line); }
.topbar .chip .dot { box-shadow: 0 0 5px currentColor; }
.pane {
  background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(240,244,250,0.96)) !important;
  box-shadow: inset 1px 0 0 rgba(255,255,255,0.9);
}
.glass {
  background: rgba(255,255,255,0.82) !important;
  border: 1px solid rgba(26,46,90,0.09) !important;
  box-shadow: 0 2px 12px -4px rgba(26,46,90,0.10), 0 1px 0 rgba(255,255,255,0.9) inset !important;
}
.pane-header { border-bottom-color: var(--line); }
.pane-body::-webkit-scrollbar-thumb { background: var(--bg-4); }

.route-card .route-id { color: var(--text-0); }

.filters .f { background: var(--bg-1); border-color: var(--line); color: var(--text-2); }
.filters .f:hover { background: var(--bg-2); border-color: var(--line-strong); color: var(--text-1); }
.divider { background: var(--line); }
.divider-soft { background: var(--line-soft); }

/* 3D comparison cards */
.comparison .col {
  background: rgba(255,255,255,0.95) !important;
  border-color: rgba(26,46,90,0.10) !important;
  box-shadow: 0 1px 0 rgba(255,255,255,1) inset, 0 8px 24px -8px rgba(26,46,90,0.14) !important;
}

  background: linear-gradient(145deg, rgba(8,145,178,0.08) 0%, rgba(255,255,255,0.95) 55%) !important;
  border-color: rgba(8,145,178,0.30) !important;
  box-shadow: 0 1px 0 rgba(255,255,255,1) inset, 0 0 0 1px rgba(8,145,178,0.12) inset,

}

.comparison .col:hover {
  box-shadow: 0 1px 0 rgba(255,255,255,1) inset, 0 16px 36px -10px rgba(26,46,90,0.18) !important;
}
.delta-banner { background: rgba(22,163,74,0.06); border-color: rgba(22,163,74,0.22); }
.btn-ghost { background: rgba(255,255,255,0.85); border-color: rgba(26,46,90,0.18); color: var(--text-1); }
.btn-ghost:hover { background: rgba(255,255,255,0.98); border-color: rgba(26,46,90,0.30); color: var(--text-0); }
.actions { border-bottom-color: var(--line); }
.detail-head { border-bottom-color: var(--line); }

/* Badges on light bg */

.badge.warning  { background: rgba(217,119,6,0.11); color: #b45309; }
.badge.ok       { background: rgba(22,163,74,0.10); color: #15803d; }
.badge.info     { background: rgba(8,145,178,0.10); color: #0369a1; }

/* KPI strip */

/* Alerts */

.alert-item.critical .pin { box-shadow: 0 0 5px rgba(220,38,38,0.5); }

/* Map sphere — enterprise light */
.map-sphere-stage {
  background:
    radial-gradient(ellipse 70% 50% at 50% 50%, rgba(8,145,178,0.07), transparent 70%),
    radial-gradient(ellipse 40% 30% at 20% 80%, rgba(124,58,237,0.04), transparent 70%),
    #e4eaf5 !important;
}
.map-sphere-container { transform: perspective(1400px) rotateY(2deg); }

<script type="text/babel">
const { useState, useEffect, useMemo, useRef, Component } = React;

// API base — explicit same-origin URL so relative paths never misresolve
const API_BASE = window.location.origin;
console.log('[BOOT] API_BASE =', API_BASE);

// ═══════════════════════════════════════════
//  ERROR BOUNDARY
// ═══════════════════════════════════════════
class ErrorBoundary extends Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null, info: null };
  }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) {
    console.error('[ErrorBoundary] CRASH in', this.props.label || 'app', error, info);
    this.setState({ info });
  }
  render() {
    if (this.state.hasError) {
      const minimal = this.props.minimal;
      const msg = this.state.error && (this.state.error.message || String(this.state.error));
      if (minimal) {
        return (
          <div style={{ padding: 16, color: 'var(--red)', fontFamily: 'var(--font-mono)', fontSize: 11 }}>
            ⚠ {this.props.label || 'Bileşen'} çöktü<br/>
            <span style={{ color: 'var(--text-3)', fontSize: 10 }}>{msg}</span>
          </div>
        );
      }
      return (
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          height: '100vh', background: 'var(--bg-0)', color: 'var(--red)',
          fontFamily: 'var(--font-mono)', fontSize: 14, flexDirection: 'column', gap: 12, padding: 40, textAlign: 'center'
        }}>
          <div style={{ fontSize: 20, fontWeight: 600 }}>RENDER HATASI</div>
          <div style={{ color: 'var(--text-2)', maxWidth: 600 }}>{msg}</div>
          <pre style={{ color: 'var(--text-3)', fontSize: 10, maxWidth: 800, overflow: 'auto', maxHeight: 200, textAlign: 'left' }}>
            {this.state.info && this.state.info.componentStack}
          </pre>
          <button className="btn btn-primary" style={{ maxWidth: 200 }}
            onClick={() => window.location.reload()}>Yeniden Yükle</button>
        </div>
      );
    }
    return this.props.children;
  }
}

window.LOGISTICS_DATA = {
  MODEL_STATS: { mae_min: '—', r2: '—', features_used: 29, top_features: {} },
  CIRCUITY: {},
};

const TWEAK_DEFAULTS = { weather: 'fog', density: 'comfortable', accent: 'violet', layout: 'focus' };

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════

function fmtTime(str) {
  if (!str) return '??:??';
  const s = String(str);
  const isoM = s.match(/[T ](\d{2}):(\d{2})/);
  if (isoM) return `${isoM[1]}:${isoM[2]}`;
  const tmM = s.match(/^(\d{2}):(\d{2})/);
  if (tmM) return `${tmM[1]}:${tmM[2]}`;
  return s.slice(0, 5);
}

function mergeToDesignFormat(routeDetail, optimResp) {
  const route = (routeDetail && routeDetail.route) || {};
  const rawStops = (routeDetail && routeDetail.stops) || [];
  const origStops = (optimResp.original_order && optimResp.original_order.stops) || [];
  const optStops  = (optimResp.optimized_order && optimResp.optimized_order.stops) || [];

  const origMap = {};  origStops.forEach(s => { origMap[s.stop_id] = s; });
  const optMap  = {};  optStops.forEach(s  => { optMap[s.stop_id]  = s; });
  const rawMap  = {};  rawStops.forEach(s  => { rawMap[s.stop_id]  = s; });

  const stopIds = origStops.map(s => s.stop_id);

  const stops = stopIds.map(sid => {
    const orig = origMap[sid] || {};
    const opt  = optMap[sid]  || {};
    const raw  = rawMap[sid]  || {};
    const dc   = orig.dynamic_conditions || {};
    return {
      stop_id:           sid,
      latitude:          orig.latitude          ?? raw.latitude          ?? 0,
      longitude:         orig.longitude         ?? raw.longitude         ?? 0,
      road_type:         orig.road_type         ?? raw.road_type         ?? 'rural',
      time_window_open:  fmtTime(orig.time_window_open  || raw.time_window_open),
      time_window_close: fmtTime(orig.time_window_close || raw.time_window_close),
      package_count:     orig.package_count     ?? raw.package_count     ?? 0,
      package_weight_kg: orig.package_weight_kg ?? raw.package_weight_kg ?? 0,
      planned_service_min: raw.planned_service_min ?? 10,
      original: {
        predicted_arrival:        fmtTime(orig.predicted_arrival),
        within_time_window:       orig.within_time_window      ?? true,
        predicted_stop_delay_min: orig.predicted_stop_delay_min ?? 0,
      },
      optimized: {
        predicted_arrival:        fmtTime(opt.predicted_arrival),
        within_time_window:       opt.within_time_window       ?? true,
        predicted_stop_delay_min: opt.predicted_stop_delay_min ?? 0,
      },
      dynamic_conditions: {
        weather:          dc.weather           || 'clear',
        traffic:          dc.traffic           || 'low',
        congestion_ratio: dc.congestion_ratio  ?? 0,
        delay_risk_score: dc.delay_risk_score  ?? 0,
        road_surface:     dc.road_surface      || 'dry',
      },
    };
  });

  const origM = (optimResp.original_order  && optimResp.original_order.metrics)  || {};
  const optM  = (optimResp.optimized_order && optimResp.optimized_order.metrics) || {};
  const origRate = origM.on_time_rate ?? 0;
  const severity = origRate < 0.3 ? 'critical' : origRate < 0.7 ? 'warning' : 'ok';

  return {
    route_id:    route.route_id || 'UNKNOWN',
    vehicle_id:  route.vehicle_id || route.route_id || '—',
    vehicle_type: route.vehicle_type || 'van',
    num_stops:   route.num_stops ?? 0,
    total_distance_km: route.total_distance_km ?? 0,
    departure_planned: route.departure_planned,
    weather_condition: (optimResp.conditions && optimResp.conditions.weather) || route.weather_condition || 'clear',
    temperature_c: route.temperature_c   ?? 0,
    visibility_km: route.visibility_km   ?? 10,
    wind_speed_kmh: route.wind_speed_kmh ?? 10,
    traffic_level: (optimResp.conditions && optimResp.conditions.traffic) || route.traffic_level || 'low',
    severity,
    delay_factor:                 optimResp.delay_factor                ?? 1,
    rf_predicted_total_delay_min: optimResp.rf_predicted_total_delay_min ?? 0,
    original_metrics: {
      on_time_rate:              origM.on_time_rate              ?? 0,
      total_predicted_delay_min: origM.total_predicted_delay_min ?? 0,
      avg_delay_per_stop_min:    origM.avg_delay_per_stop_min    ?? 0,
    },
    optimized_metrics: {
      on_time_rate:              optM.on_time_rate              ?? 0,
      total_predicted_delay_min: optM.total_predicted_delay_min ?? 0,
      avg_delay_per_stop_min:    optM.avg_delay_per_stop_min    ?? 0,
    },
    improvement: optimResp.improvement || { on_time_rate_delta: 0, delay_reduction_min: 0 },
    stops,
  };
}

// ═══════════════════════════════════════════
//  EFFICIENCY GAIN WIDGET
// ═══════════════════════════════════════════

function EfficiencyGainWidget({ routes }) {
  if (!routes || routes.length === 0) return null;
  const totalDelay = routes.reduce((s, r) => s + ((r.improvement && r.improvement.delay_reduction_min) || 0), 0);
  const avgDelta   = routes.reduce((s, r) => s + ((r.improvement && r.improvement.on_time_rate_delta) || 0), 0) / routes.length;
  const critFixed  = routes.filter(r => r.severity !== 'critical' && r.optimized_metrics && r.optimized_metrics.on_time_rate > 0.7).length;
  return (
    <div className="efficiency-widget">
      <div className="ew-label"><span className="ew-pulse"></span>Verimlilik Kazancı</div>
      <div className="ew-main">
        <span className="ew-num">−{totalDelay.toFixed(0)}</span>
        <span className="ew-unit"> dk</span>
      </div>
      <div className="ew-sub">↑ +{(avgDelta * 100).toFixed(1)}% zamanında oran</div>
      <div className="ew-sub2">{routes.length} rota · {critFixed} kurtarıldı · RF R² {window.LOGISTICS_DATA.MODEL_STATS.r2}</div>
    </div>
  );
}

// ═══════════════════════════════════════════
//  MAP VIEW — LEAFLET SATELLITE + SPHERICAL HUD
// ═══════════════════════════════════════════

const SIVAS_CENTER = [39.7477, 37.0179];
const SIVAS_BOUNDS = [[39.18, 36.82], [39.82, 37.42]];

// Quadratic bezier arc — düz çizgi yerine taktiksel kavisli hat
function bezierArc(lat1, lon1, lat2, lon2, curvature = 0.18, steps = 20) {
  const dlat = lat2 - lat1, dlon = lon2 - lon1;
  const cx = (lat1 + lat2) / 2 - dlon * curvature;
  const cy = (lon1 + lon2) / 2 + dlat * curvature;
  const pts = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    pts.push([
      (1-t)*(1-t)*lat1 + 2*(1-t)*t*cx + t*t*lat2,
      (1-t)*(1-t)*lon1 + 2*(1-t)*t*cy + t*t*lon2,
    ]);
  }
  return pts;
}
function makeArcPath(latLngs) {
  if (latLngs.length < 2) return latLngs;
  const out = [];
  for (let i = 0; i < latLngs.length - 1; i++) {
    const seg = bezierArc(latLngs[i][0], latLngs[i][1], latLngs[i+1][0], latLngs[i+1][1]);
    out.push(...(i === 0 ? seg : seg.slice(1)));
  }
  return out;
}
// Çakışan marker'ları küçük spiral offset ile ayır
function offsetOverlaps(stops) {
  const GRID = 0.004, D = 0.0028;
  const seen = {};
  return stops.map(s => {
    const key = `${(s.latitude/GRID).toFixed(0)},${(s.longitude/GRID).toFixed(0)}`;
    const n = seen[key] ?? 0;
    seen[key] = n + 1;
    const angle = n * (Math.PI * 2 / 6);
    const dist  = n === 0 ? 0 : D;
    return { ...s, _lat: s.latitude + dist * Math.cos(angle), _lon: s.longitude + dist * Math.sin(angle) };
  });
}

function MapView({ route, allRoutes, weatherVisible, weatherScenario, routeMode, onRouteMode,
                   mapStyle, onMapStyle, projectionMode, onProjectionMode }) {
  const mapElRef      = useRef(null);
  const leafletRef    = useRef(null);
  const tileLayerRef  = useRef(null);
  const labelLayerRef = useRef(null);
  const markersRef    = useRef([]);
  const polyRef       = useRef([]);
  const [mapReady, setMapReady]             = useState(false);
  const [settingsOpen, setSettingsOpen]     = useState(false);
  const [hoveredStop, setHoveredStop]       = useState(null);
  const [mousePos,    setMousePos]          = useState({ x: 0, y: 0 });
  const wrapRef = useRef(null);

  // ── 1. MAP INIT (tile-layer free) ────────────────────────────
  useEffect(() => {
    if (leafletRef.current || !mapElRef.current) return;
    if (typeof L === 'undefined') { console.error('[MapView] Leaflet not loaded'); return; }
    let cancelled = false;
    const tryInit = (attempt = 0) => {
      if (cancelled || leafletRef.current) return;
      const el = mapElRef.current;
      if (!el) return;
      const rect = el.getBoundingClientRect();
      if ((rect.width < 50 || rect.height < 50) && attempt < 20) {
        setTimeout(() => tryInit(attempt + 1), 120); return;
      }
      try {
        const map = L.map(el, {
          center: SIVAS_CENTER, zoom: 10,
          zoomControl: false, attributionControl: false,
          preferCanvas: false,
        });
        leafletRef.current = map;
        setMapReady(true);
        console.log('[MapView] map ready');
        [50, 200, 500, 1000].forEach(ms => setTimeout(() => {
          if (!cancelled && leafletRef.current) leafletRef.current.invalidateSize();
        }, ms));
      } catch (e) { console.error('[MapView] init failed:', e); }
    };
    tryInit(0);
    return () => { cancelled = true; };
  }, []);

  // ── 2. TILE LAYER — switches on mapStyle or first ready ──────
  useEffect(() => {
    const map = leafletRef.current;
    if (!mapReady || !map) return;
    // Tear down old layers
    if (tileLayerRef.current)  { try { map.removeLayer(tileLayerRef.current);  } catch(e){} tileLayerRef.current  = null; }
    if (labelLayerRef.current) { try { map.removeLayer(labelLayerRef.current); } catch(e){} labelLayerRef.current = null; }

    if (mapStyle === 'satellite') {
      const sat = L.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
        { maxZoom: 19, tileSize: 256 }
      );
      sat.on('tileload',  () => console.log('[tiles] ✓ Esri sat'));
      sat.on('tileerror', e  => console.warn('[tiles] ✗ Esri sat', e?.tile?.src));
      sat.addTo(map);
      tileLayerRef.current = sat;
      const lbl = L.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
        { maxZoom: 19, opacity: 0.65 }
      ).addTo(map);
      labelLayerRef.current = lbl;
      // OSM fallback if Esri silent after 6s
      let ok = false;
      sat.once('tileload', () => { ok = true; });
      setTimeout(() => {
        if (!ok && leafletRef.current) {
          console.warn('[tiles] Esri 6s timeout → OSM fallback');
          try { map.removeLayer(sat); map.removeLayer(lbl); } catch(e){}
          tileLayerRef.current  = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, subdomains: 'abc' }).addTo(map);
          labelLayerRef.current = null;
        }
      }, 6000);
    } else {
      // Flat / light style — CartoDB Light All
      tileLayerRef.current = L.tileLayer(
        'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
        { maxZoom: 19, subdomains: 'abcd' }
      ).addTo(map);
      console.log('[tiles] CartoDB Light');
    }
  }, [mapStyle, mapReady]);

  // Force invalidateSize whenever route changes (layout may have shifted)
  useEffect(() => {
    const map = leafletRef.current;
    if (!map) return;
    setTimeout(() => map.invalidateSize(), 80);
  }, [route && route.route_id]);

  // Update stop markers + route polylines when route changes
  useEffect(() => {
    const map = leafletRef.current;
    if (!map) return;

    // Clear old
    markersRef.current.forEach(m => map.removeLayer(m));
    markersRef.current = [];
    polyRef.current.forEach(p => map.removeLayer(p));
    polyRef.current = [];

    if (!route || !Array.isArray(route.stops) || route.stops.length === 0) {
      console.log('[MapView] no stops to render for route', route && route.route_id);
      return;
    }

    // Filter stops with valid coordinates
    const validStops = route.stops.filter(s =>
      typeof s.latitude === 'number' && typeof s.longitude === 'number' &&
      !isNaN(s.latitude) && !isNaN(s.longitude) &&
      s.latitude !== 0 && s.longitude !== 0
    );
    console.log(`[MapView] ${route.route_id}: ${validStops.length}/${route.stops.length} stops with valid coords`);
    if (validStops.length === 0) return;

    const origLatLngs = validStops.map(s => [s.latitude, s.longitude]);
    const optSorted = [...validStops]
      .sort((a, b) => (a.optimized.predicted_arrival || '').localeCompare(b.optimized.predicted_arrival || ''))
      .map(s => [s.latitude, s.longitude]);

    if (routeMode === 'both' || routeMode === 'original') {
      // Neon kavisli arc — orijinal sıra (kırmızı kesikli)
      const arcOrig = makeArcPath(origLatLngs);
      const origPoly = L.polyline(arcOrig, {
        color: '#ef4444', weight: 2.5, opacity: 0.82,
        dashArray: '7 9', lineCap: 'round', lineJoin: 'round',
      }).addTo(map);
      polyRef.current.push(origPoly);
    }

    if (routeMode === 'both' || routeMode === 'optimized') {
      // Neon kavisli arc — optimize sıra (cyan parlak)
      const arcOpt = makeArcPath(optSorted);
      const optPoly = L.polyline(arcOpt, {
        color: '#0891b2', weight: 3.5, opacity: 0.92,
        lineCap: 'round', lineJoin: 'round',
      }).addTo(map);
      // İkinci katman: parlama efekti
      const optGlow = L.polyline(arcOpt, {
        color: '#38bdf8', weight: 6, opacity: 0.22,
        lineCap: 'round', lineJoin: 'round',
      }).addTo(map);
      polyRef.current.push(optPoly, optGlow);
    }

    // Depot marker
    const depotIcon = L.divIcon({
      html: '<div class="lf-depot-marker"></div>',
      className: '', iconSize: [22, 22], iconAnchor: [11, 11],
    });
    const depot = L.marker(SIVAS_CENTER, { icon: depotIcon }).addTo(map);
    markersRef.current.push(depot);

    // Çakışan noktaları offset ile ayır, sonra marker ekle
    const displayStops = offsetOverlaps(validStops);
    displayStops.forEach((s, i) => {
      const ok  = s.original.within_time_window;
      const d   = s.dynamic_conditions || {};
      const risk = d.delay_risk_score || 0;
      const riskClass = risk > 0.6 ? 'risk-high' : risk > 0.3 ? 'risk-med' : 'risk-low';
      const cong = ((d.congestion_ratio || 0) * 100).toFixed(0);
      const weather = d.weather || 'clear';
      const surface = d.road_surface || 'dry';

      // Build badge — if stop MISSES time window, show "!" alert
      const missAlert = !ok ? '<span class="lf-miss-alert" title="Zaman penceresi kaçırıldı">!</span>' : '';
      const badgeText = !ok
        ? `⚠ ${weather} · ${cong}%`
        : `${weather} · ${cong}%`;

      const icon = L.divIcon({
        html: `
          <div class="lf-stop-marker">
            <div class="lf-stop-pin ${ok ? 'ok' : 'miss'}" style="width:30px;height:30px;font-size:10px">${i + 1}${missAlert}</div>
            <div class="lf-stop-badge ${ok ? riskClass : 'risk-high'}">${badgeText}</div>
          </div>`,
        className: '', iconSize: [92, 58], iconAnchor: [15, 30],
      });

      const tooltip = `
        <b>${s.stop_id}</b><br/>
        Varış (orj.): <b style="color:${ok?'#16a34a':'#dc2626'}">${s.original.predicted_arrival}</b><br/>
        Pencere: ${s.time_window_open}–${s.time_window_close}<br/>
        Hava: ${weather} · Yol: ${surface}<br/>
        Tıkanıklık: ${cong}% · Risk: ${risk.toFixed(2)}
        ${!ok ? '<br/><b style="color:#dc2626">⚠ PENCERE KAÇIRILDI</b>' : ''}`;

      const marker = L.marker([s._lat ?? s.latitude, s._lon ?? s.longitude], { icon })
        .bindTooltip(tooltip, { direction: 'top', offset: [0, -28], className: 'lf-tip' })
        .addTo(map);
      markersRef.current.push(marker);
    });

    // Fit bounds with padding
    if (origLatLngs.length > 0) {
      try {
        map.fitBounds(origLatLngs, { padding: [60, 60], maxZoom: 12 });
        setTimeout(() => map.invalidateSize(), 120);
      } catch(e) { console.warn('[MapView] fitBounds failed:', e); }
    }
  }, [route, routeMode]);

  // Resize observer
  useEffect(() => {
    if (!wrapRef.current) return;
    const ro = new ResizeObserver(() => {
      if (leafletRef.current) leafletRef.current.invalidateSize();
    });
    ro.observe(wrapRef.current);
    return () => ro.disconnect();
  }, []);

  const hoveredStopData = route && route.stops && route.stops.find(s => s.stop_id === hoveredStop);

  return (
    <div className="map-wrap" ref={wrapRef}
         onMouseMove={e => {
           if (!wrapRef.current) return;
           const r = wrapRef.current.getBoundingClientRect();
           setMousePos({ x: e.clientX - r.left, y: e.clientY - r.top });
         }}>

      {/* Command Sphere — projection class toggled via prop */}
      <div className={`map-sphere-stage ${projectionMode === 'flat' ? 'proj-flat' : ''}`}>
        <div className="map-sphere-container">
          <div className="map-hud-ring r4"></div>
          <div className="map-hud-ring r3"></div>
          <div className="map-hud-ring r2"></div>
          <div className="map-hud-ring r1"></div>
          <span className="map-cardinal n">N</span>
          <span className="map-cardinal e">E</span>
          <span className="map-cardinal s">S</span>
          <span className="map-cardinal w">W</span>
          <div className="map-sphere">
            <div ref={mapElRef} className="map-el" style={{ width: '100%', height: '100%' }} />
            <div className="map-fisheye"></div>
            <div className="map-sheen"></div>
          </div>
        </div>
      </div>

      {/* Overlays — outside the tilt so they stay flat */}
      <div className="map-overlay-tl">
        <button className="map-btn" title="Yakınlaştır"  onClick={() => leafletRef.current && leafletRef.current.zoomIn()}>+</button>
        <button className="map-btn" title="Uzaklaştır"   onClick={() => leafletRef.current && leafletRef.current.zoomOut()}>−</button>
        <button className="map-btn" title="Merkeze git"  onClick={() => leafletRef.current && leafletRef.current.setView(SIVAS_CENTER, 10)}>◎</button>
        <button className={`map-btn ${settingsOpen ? 'active' : ''}`} title="Harita Ayarları"
          onClick={() => setSettingsOpen(v => !v)}>⚙</button>
      </div>

      {/* Map settings popup */}
      {settingsOpen && (
        <div className="map-settings-popup">
          <div className="sp-head">Harita Ayarları</div>
          <div className="sp-row">
            <span>Stil</span>
            <div className="sp-pills">
              {[['satellite','SAT'],['flat','FLAT']].map(([k,l]) => (
                <button key={k} className={mapStyle === k ? 'active' : ''} onClick={() => onMapStyle(k)}>{l}</button>
              ))}
            </div>
          </div>
          <div className="sp-row" style={{ marginTop: 4 }}>
            <span>Projeksiyon</span>
            <div className="sp-pills">
              {[['sphere','SPHERE'],['flat','FLAT']].map(([k,l]) => (
                <button key={k} className={projectionMode === k ? 'active' : ''} onClick={() => onProjectionMode(k)}>{l}</button>
              ))}
            </div>
          </div>
        </div>
      )}

      <div className="map-overlay-tr">
        <div className="map-hud">
          <span className="k">ROTA</span><span className="v">{route ? route.route_id : '—'}</span>
        </div>
        <div className="map-hud">
          <span className="k">MESAFE</span><span className="v">{route ? Number(route.total_distance_km).toFixed(1) : '—'} km</span>
        </div>

      <div className="map-overlay-bl">
        <div className="map-legend">
          <div className="title">Görünüm</div>
          <div style={{ display: 'flex', gap: 2, marginBottom: 8 }}>
            {['both', 'original', 'optimized'].map(m => (
              <button key={m} onClick={() => onRouteMode(m)} style={{
                padding: '3px 8px', fontSize: 11, borderRadius: 3, fontFamily: 'var(--font-mono)',

  );

function Sparkline({ data, width = 80, height = 22, color = 'var(--cyan)' }) {
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / range) * height;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const area = `0,${height} ` + pts + ` ${width},${height}`;
  return (
    <svg className="spark" width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <polygon points={area} fill={color} opacity="0.12" />
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" />
    </svg>
  );
}

function TimelineGantt({ route }) {
  const [mode, setMode] = useState('compare');
  if (!route || !route.stops) return <div style={{ padding: 20, color: 'var(--text-3)', fontSize: 12 }}>Bu rota için durak detayı yok.</div>;

  const parseT = (t) => {
    if (!t || t === '??:??') return 0;
    const [h, m] = t.split(':').map(Number);
    let mins = h * 60 + m;
    if (h < 6) mins += 24 * 60;
    return mins;
  };

  const allTimes = [];
  route.stops.forEach(s => {
    allTimes.push(parseT(s.time_window_open));
    allTimes.push(parseT(s.time_window_close));
    allTimes.push(parseT(s.original.predicted_arrival));
    allTimes.push(parseT(s.optimized.predicted_arrival));
  });
  const tMin = Math.min(...allTimes.filter(t => t > 0)) - 15;
  const tMax = Math.max(...allTimes) + 15;
  const span = tMax - tMin || 1;
  const pctFor = (t) => ((parseT(t) - tMin) / span) * 100;

  const tickStep = span > 300 ? 120 : span > 120 ? 60 : 30;
  const ticks = [];
  for (let t = Math.ceil(tMin / tickStep) * tickStep; t <= tMax; t += tickStep) {
    const h = Math.floor(t / 60) % 24;
    const m = t % 60;
    ticks.push({ pct: ((t - tMin) / span) * 100, label: `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}` });
  }

  return (
    <div className="timeline">
      <div className="timeline-head">
        <div>
          <h3 style={{ margin: 0, fontSize: 13, color: 'var(--text-0)', fontWeight: 600 }}>Durak Zaman Çizelgesi</h3>
          <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 2 }}>Yeşil = zamanında · Kırmızı = pencere kaçırıldı · Mavi şerit = teslimat penceresi</div>
        </div>
        <div className="tabs">
          <button className={mode==='compare'?'active':''} onClick={()=>setMode('compare')}>Karşılaştır</button>
          <button className={mode==='original'?'active':''} onClick={()=>setMode('original')}>Orjinal</button>
          <button className={mode==='optimized'?'active':''} onClick={()=>setMode('optimized')}>Opt.</button>
        </div>
      </div>
      <div className="gantt-axis">
        <div></div>
        <div className="ticks">{ticks.map((t, i) => <span key={i}>{t.label}</span>)}</div>
        <div></div>
      </div>
      <div className="gantt">
        {route.stops.map((s, i) => {
          const winL = pctFor(s.time_window_open);
          const winR = pctFor(s.time_window_close);
          const origL = pctFor(s.original.predicted_arrival);
          const optL  = pctFor(s.optimized.predicted_arrival);
          const serviceWpct = (s.planned_service_min / span) * 100;
          return (
            <div className="gantt-row" key={s.stop_id}>
              <div className="label">{String(i+1).padStart(2,'0')} · {s.stop_id.slice(-5)}</div>
              <div className="track">
                <div className="window" style={{ left: `${winL}%`, width: `${winR - winL}%` }}></div>
                {(mode === 'compare' || mode === 'original') && (
                  <div className={`bar ${s.original.within_time_window ? 'ok' : 'miss'}`}
                       style={{ left: `${origL}%`, width: `${Math.max(serviceWpct, 1.2)}%`, top: mode==='compare'?1:3, height: mode==='compare'?4:10 }}></div>
                )}
                {(mode === 'compare' || mode === 'optimized') && (
                  <div className="bar ok" style={{ background: 'var(--cyan)', boxShadow: '0 0 4px var(--cyan-glow)',
                    left: `${optL}%`, width: `${Math.max(serviceWpct, 1.2)}%`, top: mode==='compare'?11:3, height: mode==='compare'?4:10 }}></div>
                )}
              </div>
              <div className={`delay ${s.original.within_time_window ? 'ok' : 'miss'}`}>
                {s.original.within_time_window ? '✓' : `+${Number(s.original.predicted_stop_delay_min).toFixed(0)}′`}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

  const hh = String(t.getHours()).padStart(2,'0');

function KpiStrip({ routes }) {
  if (!routes || routes.length === 0) return <div className="kpi-strip"></div>;
  const total = routes.length;
  const avgOrig = routes.reduce((s, r) => s + ((r.original_metrics && r.original_metrics.on_time_rate) || 0), 0) / total;
  const avgOpt  = routes.reduce((s, r) => s + ((r.optimized_metrics && r.optimized_metrics.on_time_rate) || 0), 0) / total;
  const totalDelayReduction = routes.reduce((s, r) => s + ((r.improvement && r.improvement.delay_reduction_min) || 0), 0);
  const totalStops = routes.reduce((s, r) => s + (r.num_stops || 0), 0);
  return (
    <div className="kpi-strip">
      <div className="kpi">
        <div className="k">Aktif Rota</div>
        <div className="v">{total}<span className="unit"> / {totalStops} durak</span></div>
        <div className="trend">{Sparkline({ data: [3,5,4,6,5,7,6], width: 60, height: 16 })}</div>
      </div>
      <div className="kpi">
        <div className="k">Zamanında (Mevcut)</div>
        <div className="v">{(avgOrig * 100).toFixed(1)}<span className="unit">%</span></div>
        <div className="trend down">↓ risk: yüksek</div>
      </div>
      <div className="kpi">
        <div className="k">Zamanında (Optimize)</div>
        <div className="v" style={{ color: 'var(--cyan)' }}>{(avgOpt * 100).toFixed(1)}<span className="unit">%</span></div>
        <div className="trend">↑ +{((avgOpt - avgOrig) * 100).toFixed(1)}pp potansiyel</div>
      </div>
      <div className="kpi">
        <div className="k">Toplam Gecikme Düşüşü</div>
        <div className="v" style={{ color: 'var(--lime)' }}>−{totalDelayReduction.toFixed(0)}<span className="unit"> dk</span></div>

  );
