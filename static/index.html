<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sivas Lojistik Komuta Paneli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-0: #070b11;
  --bg-1: #0c1219;
  --bg-2: #111924;
  --bg-3: #172230;
  --bg-4: #1f2c3d;
  --line-soft: rgba(148, 178, 214, 0.08);
  --line: rgba(148, 178, 214, 0.14);
  --line-strong: rgba(148, 178, 214, 0.26);
  --text-0: #e8f0fa;
  --text-1: #b8c7d9;
  --text-2: #7d8ea3;
  --text-3: #556479;
  --cyan: #5dd6e6;
  --cyan-soft: rgba(93, 214, 230, 0.12);
  --cyan-glow: rgba(93, 214, 230, 0.35);
  --amber: #f5b945;
  --amber-soft: rgba(245, 185, 69, 0.14);
  --red: #ff6b6b;
  --red-soft: rgba(255, 107, 107, 0.14);
  --lime: #8ee68a;
  --lime-soft: rgba(142, 230, 138, 0.12);
  --violet: #a78bfa;
  --font-ui: 'Inter Tight', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', monospace;
  --fs-xs: 10px; --fs-sm: 11px; --fs-md: 13px; --fs-lg: 15px;
  --fs-xl: 18px; --fs-2xl: 24px; --fs-3xl: 36px; --fs-4xl: 52px;
  --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px;
  --space-5: 20px; --space-6: 24px; --space-8: 32px;
  --radius-sm: 4px; --radius-md: 6px; --radius-lg: 10px;
  --shadow-panel: 0 1px 0 rgba(255,255,255,0.02) inset, 0 24px 48px -24px rgba(0,0,0,0.6);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg-0); color: var(--text-1);
  font-family: var(--font-ui); font-size: var(--fs-md); line-height: 1.4;
  -webkit-font-smoothing: antialiased; font-feature-settings: 'ss01', 'cv11'; letter-spacing: -0.005em; }
#root { width: 100vw; min-height: 100vh; }
.mono { font-family: var(--font-mono); font-feature-settings: 'ss02', 'zero'; letter-spacing: 0; }
.upper { text-transform: uppercase; letter-spacing: 0.08em; font-size: var(--fs-xs); color: var(--text-2); font-weight: 500; }
.num { font-variant-numeric: tabular-nums; font-family: var(--font-mono); }
button { font-family: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
button:focus-visible { outline: 1px solid var(--cyan); outline-offset: 2px; }
.app { display: grid; grid-template-rows: 52px 1fr 36px; height: 100vh; overflow: hidden;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(93,214,230,0.04), transparent 60%), var(--bg-0); }
.topbar { display: flex; align-items: center; gap: var(--space-5); padding: 0 var(--space-5);
  border-bottom: 1px solid var(--line); background: var(--bg-1); }
.topbar .brand { display: flex; align-items: center; gap: var(--space-3); font-weight: 600; color: var(--text-0); font-size: var(--fs-md); }
.topbar .brand .mark { width: 22px; height: 22px; border-radius: 5px;
  background: linear-gradient(135deg, var(--cyan) 0%, #2a7b8a 100%); position: relative;
  box-shadow: 0 0 0 1px rgba(93,214,230,0.3), 0 0 12px var(--cyan-glow); }
.topbar .brand .mark::after { content: ''; position: absolute; inset: 5px;
  border: 1.5px solid var(--bg-1); border-radius: 2px; border-right-color: transparent; border-bottom-color: transparent; }
.topbar .brand .sub { color: var(--text-2); font-weight: 400; margin-left: var(--space-2); }
.topbar nav { display: flex; gap: 2px; margin-left: var(--space-6); }
.topbar nav button { padding: 6px 12px; border-radius: var(--radius-sm); color: var(--text-2); font-size: var(--fs-md); font-weight: 500; transition: all 0.12s; }
.topbar nav button.active { color: var(--text-0); background: var(--bg-3); }
.topbar nav button:hover:not(.active) { color: var(--text-1); background: var(--bg-2); }
.topbar .spacer { flex: 1; }
.topbar .status-chips { display: flex; gap: var(--space-3); align-items: center; }
.topbar .chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 999px;
  background: var(--bg-2); border: 1px solid var(--line); font-size: var(--fs-sm); color: var(--text-1); }
.topbar .chip .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--lime); box-shadow: 0 0 6px var(--lime); }
.topbar .chip.warning .dot { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
.topbar .chip.critical .dot { background: var(--red); box-shadow: 0 0 6px var(--red); animation: pulse 1.6s infinite; }
.topbar .chip.info .dot { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
@keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: 0.35 } }
.topbar .clock { font-family: var(--font-mono); color: var(--text-0); font-size: var(--fs-md); }
.topbar .clock .tz { color: var(--text-3); margin-left: 6px; font-size: var(--fs-sm); }
.main { display: grid; grid-template-columns: 340px 1fr 400px; gap: 1px; background: var(--line); overflow: hidden; }
.main.wide-map { grid-template-columns: 300px 1fr 380px; }
.pane { background: linear-gradient(180deg, rgba(23,34,48,0.55), rgba(12,18,25,0.85));
  backdrop-filter: blur(18px) saturate(1.1); -webkit-backdrop-filter: blur(18px) saturate(1.1);
  overflow: hidden; display: flex; flex-direction: column; min-height: 0;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), inset -1px 0 0 rgba(255,255,255,0.02); }
.glass { background: rgba(23,34,48,0.45); backdrop-filter: blur(14px) saturate(1.2);
  -webkit-backdrop-filter: blur(14px) saturate(1.2); border: 1px solid rgba(148,178,214,0.12);
  border-radius: var(--radius-md); box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 10px 30px -12px rgba(0,0,0,0.6); }
.pane-header { display: flex; align-items: center; justify-content: space-between;
  padding: 10px var(--space-4); border-bottom: 1px solid var(--line); flex-shrink: 0; }
.pane-header h3 { margin: 0; font-size: var(--fs-md); color: var(--text-0); font-weight: 600; letter-spacing: -0.01em; }
.pane-header .count { color: var(--text-3); font-family: var(--font-mono); font-size: var(--fs-sm); margin-left: 8px; }
.pane-body { flex: 1; overflow-y: auto; overflow-x: hidden; }
.pane-body::-webkit-scrollbar { width: 8px; }
.pane-body::-webkit-scrollbar-track { background: transparent; }
.pane-body::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 4px; }
.pane-body::-webkit-scrollbar-thumb:hover { background: var(--bg-4); }
.footer { display: flex; align-items: center; gap: var(--space-5); padding: 0 var(--space-4);
  border-top: 1px solid var(--line); background: var(--bg-1); font-size: var(--fs-sm); color: var(--text-2); }
.footer .k { color: var(--text-3); margin-right: 6px; }
.footer .v { color: var(--text-1); font-family: var(--font-mono); }
.footer .sep { width: 1px; height: 14px; background: var(--line); }
.footer .right { margin-left: auto; display: flex; gap: var(--space-5); align-items: center; }
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px; border-radius: 3px;
  font-size: var(--fs-xs); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; font-family: var(--font-mono); }
.badge.critical { background: var(--red-soft); color: var(--red); }
.badge.warning { background: var(--amber-soft); color: var(--amber); }
.badge.ok { background: var(--lime-soft); color: var(--lime); }
.badge.info { background: var(--cyan-soft); color: var(--cyan); }
.badge.muted { background: var(--bg-3); color: var(--text-2); }
.divider { height: 1px; background: var(--line); margin: var(--space-4) 0; }
.divider-soft { height: 1px; background: var(--line-soft); margin: var(--space-3) 0; }
.route-card { position: relative; padding: 12px 16px; border-bottom: 1px solid var(--line-soft); cursor: pointer; transition: background 0.12s; }
.route-card:hover { background: var(--bg-2); }
.route-card.selected { background: var(--bg-3); }
.route-card.selected::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
  background: var(--cyan); box-shadow: 0 0 8px var(--cyan-glow); }
.route-card .row-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.route-card .route-id { font-family: var(--font-mono); font-size: var(--fs-md); color: var(--text-0); font-weight: 500; }
.route-card .vehicle { font-size: var(--fs-sm); color: var(--text-2); display: flex; align-items: center; gap: 6px; }
.route-card .row-metrics { display: flex; gap: 12px; font-size: var(--fs-sm); margin-top: 8px; }
.route-card .row-metrics .m .k { color: var(--text-3); font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 2px; }
.route-card .row-metrics .m .v { font-family: var(--font-mono); color: var(--text-1); }
.route-card .row-metrics .m .v.critical { color: var(--red); }
.route-card .row-metrics .m .v.warning { color: var(--amber); }
.route-card .row-metrics .m .v.ok { color: var(--lime); }
.route-card .progress { margin-top: 10px; height: 3px; background: var(--bg-3); border-radius: 2px; overflow: hidden; position: relative; }
.route-card .progress .fill { height: 100%; background: var(--cyan); box-shadow: 0 0 6px var(--cyan-glow); }
.route-card .progress .fill.warning { background: var(--amber); box-shadow: 0 0 6px rgba(245,185,69,0.4); }
.route-card .progress .fill.critical { background: var(--red); box-shadow: 0 0 6px rgba(255,107,107,0.4); }
.route-card .progress .fill.ok { background: var(--lime); box-shadow: 0 0 6px rgba(142,230,138,0.4); }
.filters { display: flex; gap: 4px; padding: 10px 12px; border-bottom: 1px solid var(--line-soft); flex-wrap: wrap; }
.filters .f { padding: 4px 9px; border-radius: var(--radius-sm); background: var(--bg-2); border: 1px solid var(--line);
  font-size: var(--fs-sm); color: var(--text-2); cursor: pointer; transition: all 0.12s; font-family: var(--font-mono); }
.filters .f:hover { color: var(--text-1); border-color: var(--line-strong); }
.filters .f.active { color: var(--bg-0); background: var(--cyan); border-color: var(--cyan); font-weight: 600; }
.map-wrap { position: relative; width: 100%; height: 100%; overflow: hidden;
  background: radial-gradient(ellipse 60% 40% at 30% 20%, rgba(93,214,230,0.05), transparent 70%),
    radial-gradient(ellipse 50% 40% at 75% 75%, rgba(167,139,250,0.04), transparent 70%),
    linear-gradient(180deg, #0a131e 0%, #060a10 100%); }
.map-svg { width: 100%; height: 100%; display: block; }
.map-overlay-tl { position: absolute; top: 12px; left: 12px; display: flex; flex-direction: column; gap: 6px; z-index: 5; }
.map-overlay-tr { position: absolute; top: 12px; right: 12px; display: flex; flex-direction: column; gap: 6px; z-index: 5; align-items: flex-end; }
.map-overlay-bl { position: absolute; bottom: 12px; left: 12px; display: flex; flex-direction: column; gap: 8px; z-index: 5; }
.map-overlay-br { position: absolute; bottom: 12px; right: 12px; z-index: 5; }
.map-btn { background: rgba(23,34,48,0.55); backdrop-filter: blur(14px) saturate(1.2);
  -webkit-backdrop-filter: blur(14px) saturate(1.2); border: 1px solid rgba(148,178,214,0.15);
  box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 4px 14px -4px rgba(0,0,0,0.5);
  width: 30px; height: 30px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center;
  color: var(--text-1); cursor: pointer; transition: all 0.12s; font-size: 14px; }
.map-btn:hover { border-color: var(--line-strong); color: var(--text-0); }
.map-btn.active { background: var(--cyan-soft); border-color: var(--cyan); color: var(--cyan); }
.map-layer-toggle { background: rgba(23,34,48,0.55); backdrop-filter: blur(14px) saturate(1.2);
  -webkit-backdrop-filter: blur(14px) saturate(1.2); border: 1px solid rgba(148,178,214,0.15); border-radius: var(--radius-md);
  box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 4px 14px -4px rgba(0,0,0,0.5);
  padding: 6px 10px; display: flex; align-items: center; gap: 10px; font-size: var(--fs-sm); }
.map-layer-toggle .toggle-item { display: flex; align-items: center; gap: 5px; cursor: pointer; color: var(--text-2); }
.map-layer-toggle .toggle-item.on { color: var(--text-0); }
.map-layer-toggle .dot { width: 7px; height: 7px; border-radius: 2px; }
.map-legend { background: rgba(23,34,48,0.55); backdrop-filter: blur(14px) saturate(1.2);
  -webkit-backdrop-filter: blur(14px) saturate(1.2); border: 1px solid rgba(148,178,214,0.15); border-radius: var(--radius-md);
  box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 6px 18px -6px rgba(0,0,0,0.55);
  padding: 10px 12px; font-size: var(--fs-sm); min-width: 180px; }
.map-legend .title { color: var(--text-3); font-size: var(--fs-xs); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.map-legend .li { display: flex; align-items: center; gap: 8px; color: var(--text-1); margin-bottom: 3px; }
.map-legend .swatch { width: 14px; height: 3px; border-radius: 2px; }
.map-hud { background: rgba(23,34,48,0.55); backdrop-filter: blur(14px) saturate(1.2);
  -webkit-backdrop-filter: blur(14px) saturate(1.2); border: 1px solid rgba(148,178,214,0.15); border-radius: var(--radius-md);
  box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 4px 14px -4px rgba(0,0,0,0.5);
  padding: 8px 12px; font-size: var(--fs-sm); font-family: var(--font-mono); }
.map-hud .k { color: var(--text-3); margin-right: 6px; }
.map-hud .v { color: var(--text-0); }
.map-coords { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--text-3);
  background: rgba(12,18,25,0.6); padding: 3px 8px; border-radius: 3px; z-index: 4; }
.stop-pin { cursor: pointer; transition: transform 0.12s; }
.stop-pin:hover { transform: scale(1.1); }
.stop-pin text { font-family: var(--font-mono); font-size: 9px; font-weight: 700; }
.map-tooltip { position: absolute; z-index: 10; background: rgba(7,11,17,0.96); backdrop-filter: blur(10px);
  border: 1px solid var(--line-strong); border-radius: var(--radius-md); padding: 10px 12px;
  font-size: var(--fs-sm); pointer-events: none; min-width: 200px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
.map-tooltip .tt-title { color: var(--text-0); font-weight: 600; margin-bottom: 4px; display: flex; justify-content: space-between; }
.map-tooltip .tt-row { display: flex; justify-content: space-between; gap: 12px; margin: 2px 0; }
.map-tooltip .tt-row .k { color: var(--text-3); }
.map-tooltip .tt-row .v { color: var(--text-1); font-family: var(--font-mono); }
.detail-head { padding: var(--space-4); border-bottom: 1px solid var(--line); }
.detail-head .route-title { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.detail-head .rid { font-family: var(--font-mono); font-size: var(--fs-xl); color: var(--text-0); font-weight: 600; letter-spacing: -0.01em; }
.detail-head .rid .sub { color: var(--text-3); font-size: var(--fs-sm); margin-left: 8px; font-weight: 400; }
.comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; perspective: 1000px; }
.comparison .col { background: rgba(23,34,48,0.55); backdrop-filter: blur(14px) saturate(1.2);
  -webkit-backdrop-filter: blur(14px) saturate(1.2); border: 1px solid rgba(148,178,214,0.15); border-radius: var(--radius-md);
  padding: 12px 14px; box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 10px 24px -10px rgba(0,0,0,0.6);
  transform: rotateX(2deg); transition: transform 0.2s; }
.comparison .col:hover { transform: rotateX(0) translateY(-2px); }
.comparison .col .label { font-size: var(--fs-xs); color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.comparison .col .big { font-family: var(--font-mono); font-size: var(--fs-2xl); color: var(--text-0); font-weight: 500; letter-spacing: -0.02em; }
.comparison .col .unit { color: var(--text-3); font-size: var(--fs-sm); margin-left: 2px; }
.comparison .col.optimized { background: linear-gradient(180deg, rgba(93,214,230,0.1), rgba(23,34,48,0.55));
  border-color: rgba(93,214,230,0.25);
  box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 0 0 1px rgba(93,214,230,0.1) inset, 0 10px 30px -10px rgba(93,214,230,0.25); }
.comparison .col.optimized .big { color: var(--cyan); text-shadow: 0 0 14px var(--cyan-glow); }
.delta-banner { margin-top: 10px; padding: 10px 12px; background: var(--lime-soft);
  border: 1px solid rgba(142,230,138,0.3); border-radius: var(--radius-md);
  display: flex; align-items: center; gap: 10px; font-size: var(--fs-md); color: var(--text-0); }
.delta-banner .arrow { color: var(--lime); font-family: var(--font-mono); font-weight: 700; }
.delta-banner .metric { font-family: var(--font-mono); color: var(--lime); font-weight: 600; }
.actions { display: flex; gap: 8px; padding: 12px var(--space-4); border-bottom: 1px solid var(--line); }
.btn { flex: 1; padding: 8px 12px; border-radius: var(--radius-sm); font-size: var(--fs-md); font-weight: 500;
  transition: all 0.12s; text-align: center; border: 1px solid transparent; }
.btn-primary { background: var(--cyan); color: var(--bg-0); }
.btn-primary:hover { background: #7ee3f0; box-shadow: 0 0 12px var(--cyan-glow); }
.btn-ghost { border-color: var(--line); color: var(--text-1); background: var(--bg-2); }
.btn-ghost:hover { border-color: var(--line-strong); color: var(--text-0); }
.timeline { padding: var(--space-4); }
.timeline-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.timeline-head .tabs { display: flex; gap: 2px; background: var(--bg-2); border-radius: var(--radius-sm); padding: 2px; }
.timeline-head .tabs button { padding: 4px 10px; border-radius: 3px; font-size: var(--fs-sm); color: var(--text-2); font-weight: 500; }
.timeline-head .tabs button.active { background: var(--bg-4); color: var(--text-0); }
.gantt { display: flex; flex-direction: column; gap: 3px; }
.gantt-row { display: grid; grid-template-columns: 60px 1fr 55px; align-items: center; gap: 8px; padding: 4px 0; font-size: var(--fs-sm); }
.gantt-row:hover { background: var(--bg-2); }
.gantt-row .label { font-family: var(--font-mono); color: var(--text-2); font-size: var(--fs-xs); }
.gantt-row .track { position: relative; height: 16px; background: var(--bg-2); border-radius: 3px; overflow: hidden; }
.gantt-row .window { position: absolute; top: 0; bottom: 0; background: var(--cyan-soft); border-left: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }
.gantt-row .bar { position: absolute; top: 3px; height: 10px; border-radius: 2px; background: var(--text-2); }
.gantt-row .bar.ok { background: var(--lime); box-shadow: 0 0 4px rgba(142,230,138,0.4); }
.gantt-row .bar.miss { background: var(--red); box-shadow: 0 0 4px rgba(255,107,107,0.4); }
.gantt-row .delay { font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--text-3); text-align: right; }
.gantt-row .delay.miss { color: var(--red); }
.gantt-row .delay.ok { color: var(--text-2); }
.gantt-axis { display: grid; grid-template-columns: 60px 1fr 55px; gap: 8px; margin-bottom: 6px; font-size: var(--fs-xs); color: var(--text-3); font-family: var(--font-mono); }
.gantt-axis .ticks { display: flex; justify-content: space-between; }
.stops-list { padding: 0 var(--space-4) var(--space-4); }
.stop-row { display: grid; grid-template-columns: 24px 1fr auto; gap: 10px; padding: 10px 0;
  border-bottom: 1px solid var(--line-soft); align-items: center; }
.stop-row:last-child { border-bottom: 0; }
.stop-row .seq { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono); font-size: var(--fs-xs); font-weight: 700; border: 1px solid var(--line); }
.stop-row .seq.ok { border-color: var(--lime); color: var(--lime); background: var(--lime-soft); }
.stop-row .seq.miss { border-color: var(--red); color: var(--red); background: var(--red-soft); }
.stop-row .main-info .sid { color: var(--text-0); font-family: var(--font-mono); font-size: var(--fs-md); }
.stop-row .main-info .meta { font-size: var(--fs-xs); color: var(--text-3); margin-top: 2px; display: flex; gap: 8px; flex-wrap: wrap; }

<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// ── default stub (replaced by API on load) ──
window.LOGISTICS_DATA = {
  MODEL_STATS: { mae_min: '—', r2: '—', features_used: 29, top_features: {} },
  CIRCUITY: {},
};

const TWEAK_DEFAULTS = { weather: 'fog', density: 'comfortable', accent: 'violet', layout: 'focus' };

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════

function fmtTime(str) {
  if (!str) return '??:??';
  const s = String(str);
  const isoM = s.match(/[T ](\d{2}):(\d{2})/);
  if (isoM) return `${isoM[1]}:${isoM[2]}`;
  const tmM = s.match(/^(\d{2}):(\d{2})/);
  if (tmM) return `${tmM[1]}:${tmM[2]}`;
  return s.slice(0, 5);
}

function mergeToDesignFormat(routeDetail, optimResp) {
  const route = routeDetail.route;
  const rawStops = routeDetail.stops || [];
  const origStops = (optimResp.original_order && optimResp.original_order.stops) || [];
  const optStops  = (optimResp.optimized_order && optimResp.optimized_order.stops) || [];

  const origMap = {};  origStops.forEach(s => { origMap[s.stop_id] = s; });
  const optMap  = {};  optStops.forEach(s  => { optMap[s.stop_id]  = s; });
  const rawMap  = {};  rawStops.forEach(s  => { rawMap[s.stop_id]  = s; });

  // Use original order as canonical stop list
  const stopIds = origStops.map(s => s.stop_id);

  const stops = stopIds.map(sid => {
    const orig = origMap[sid] || {};
    const opt  = optMap[sid]  || {};
    const raw  = rawMap[sid]  || {};
    const dc   = orig.dynamic_conditions || {};
    return {
      stop_id:           sid,
      latitude:          orig.latitude          ?? raw.latitude          ?? 0,
      longitude:         orig.longitude         ?? raw.longitude         ?? 0,
      road_type:         orig.road_type         ?? raw.road_type         ?? 'rural',
      time_window_open:  fmtTime(orig.time_window_open  || raw.time_window_open),
      time_window_close: fmtTime(orig.time_window_close || raw.time_window_close),
      package_count:     orig.package_count     ?? raw.package_count     ?? 0,
      package_weight_kg: orig.package_weight_kg ?? raw.package_weight_kg ?? 0,
      planned_service_min: raw.planned_service_min ?? 10,
      original: {
        predicted_arrival:       fmtTime(orig.predicted_arrival),
        within_time_window:      orig.within_time_window      ?? true,
        predicted_stop_delay_min: orig.predicted_stop_delay_min ?? 0,
      },
      optimized: {
        predicted_arrival:       fmtTime(opt.predicted_arrival),
        within_time_window:      opt.within_time_window       ?? true,
        predicted_stop_delay_min: opt.predicted_stop_delay_min ?? 0,
      },
      dynamic_conditions: {
        weather:           dc.weather           || 'clear',
        traffic:           dc.traffic           || 'low',
        congestion_ratio:  dc.congestion_ratio  ?? 0,
        delay_risk_score:  dc.delay_risk_score  ?? 0,
        road_surface:      dc.road_surface      || 'dry',
      },
    };
  });

  const origM = (optimResp.original_order  && optimResp.original_order.metrics)  || {};
  const optM  = (optimResp.optimized_order && optimResp.optimized_order.metrics) || {};
  const origRate = origM.on_time_rate ?? 0;
  const severity = origRate < 0.3 ? 'critical' : origRate < 0.7 ? 'warning' : 'ok';

  return {
    route_id:    route.route_id,
    vehicle_id:  route.vehicle_id  || route.route_id,
    vehicle_type: route.vehicle_type || 'van',
    num_stops:   route.num_stops,
    total_distance_km: route.total_distance_km,
    departure_planned: route.departure_planned,
    weather_condition: (optimResp.conditions && optimResp.conditions.weather) || route.weather_condition || 'clear',
    temperature_c: route.temperature_c   ?? 0,
    visibility_km: route.visibility_km   ?? 10,
    wind_speed_kmh: route.wind_speed_kmh ?? 10,
    traffic_level: (optimResp.conditions && optimResp.conditions.traffic) || route.traffic_level || 'low',
    severity,
    delay_factor:               optimResp.delay_factor                ?? 1,
    rf_predicted_total_delay_min: optimResp.rf_predicted_total_delay_min ?? 0,
    original_metrics: {
      on_time_rate:              origM.on_time_rate              ?? 0,
      total_predicted_delay_min: origM.total_predicted_delay_min ?? 0,
      avg_delay_per_stop_min:    origM.avg_delay_per_stop_min    ?? 0,
    },
    optimized_metrics: {
      on_time_rate:              optM.on_time_rate              ?? 0,
      total_predicted_delay_min: optM.total_predicted_delay_min ?? 0,
      avg_delay_per_stop_min:    optM.avg_delay_per_stop_min    ?? 0,
    },
    improvement: optimResp.improvement || { on_time_rate_delta: 0, delay_reduction_min: 0 },
    stops,
  };
}

// ═══════════════════════════════════════════
//  MAP COMPONENTS  (from Map.jsx)
// ═══════════════════════════════════════════

const MAP_BBOX = { minLat: 39.18, maxLat: 39.82, minLon: 36.82, maxLon: 37.42 };

function project(lat, lon, width, height, pad = 30) {
  const x = pad + ((lon - MAP_BBOX.minLon) / (MAP_BBOX.maxLon - MAP_BBOX.minLon)) * (width - 2 * pad);
  const y = pad + (1 - (lat - MAP_BBOX.minLat) / (MAP_BBOX.maxLat - MAP_BBOX.minLat)) * (height - 2 * pad);
  return [x, y];
}

const SIVAS_CENTER = { lat: 39.7477, lon: 37.0179 };

function TerrainBase({ width, height }) {
  const grid = [];
  const step = 48;
  for (let x = 0; x <= width; x += step) grid.push(<line key={`vx${x}`} x1={x} y1={0} x2={x} y2={height} stroke="rgba(148,178,214,0.04)" strokeWidth="1" />);
  for (let y = 0; y <= height; y += step) grid.push(<line key={`hy${y}`} x1={0} y1={y} x2={width} y2={y} stroke="rgba(148,178,214,0.04)" strokeWidth="1" />);
  const contours = [];
  const seed = (i) => Math.sin(i * 12.9898) * 43758.5453;
  for (let i = 0; i < 8; i++) {
    const pts = [];
    const yBase = (i + 1) * (height / 9);
    for (let x = 0; x <= width; x += 20) {
      const noise = (seed(i * 100 + x) - Math.floor(seed(i * 100 + x))) * 26 - 13;
      const noise2 = Math.sin((x + i * 50) / 60) * 14;
      pts.push(`${x},${yBase + noise + noise2}`);
    }
    contours.push(<polyline key={`c${i}`} points={pts.join(' ')} fill="none" stroke="rgba(93,214,230,0.05)" strokeWidth="1" />);
  }
  return <g>{grid}{contours}</g>;
}

function RoadNetwork({ width, height }) {
  const roads = [
    { d: "M 40 260 Q 220 240 420 280 T 780 250", w: 3, label: "D260" },
    { d: "M 320 30 Q 360 200 400 360 T 480 720", w: 3, label: "D850" },
    { d: "M 80 80 Q 240 180 380 160 T 720 120", w: 1.5 },
    { d: "M 60 480 Q 200 440 360 500 T 740 540", w: 1.5 },
    { d: "M 600 40 Q 650 200 680 380", w: 1.5 },
    { d: "M 140 620 Q 300 580 460 660", w: 1.5 }
  ];
  return (
    <g>
      {roads.map((r, i) => (
        <g key={i}>
          <path d={r.d} stroke="rgba(148,178,214,0.14)" strokeWidth={r.w + 2} fill="none" strokeLinecap="round" />
          <path d={r.d} stroke="rgba(148,178,214,0.25)" strokeWidth={r.w} fill="none" strokeLinecap="round" />
        </g>
      ))}
      <g fontFamily="var(--font-mono)" fontSize="9" fill="rgba(148,178,214,0.35)" fontWeight="500">
        <rect x="385" y="270" width="28" height="12" fill="rgba(12,18,25,0.8)" stroke="rgba(148,178,214,0.14)" rx="2" />
        <text x="399" y="279" textAnchor="middle" fill="rgba(148,178,214,0.6)">D260</text>
        <rect x="360" y="380" width="28" height="12" fill="rgba(12,18,25,0.8)" stroke="rgba(148,178,214,0.14)" rx="2" />
        <text x="374" y="389" textAnchor="middle" fill="rgba(148,178,214,0.6)">D850</text>
      </g>
    </g>
  );
}

function WeatherOverlay({ width, height, scenario, visible }) {
  if (!visible) return null;
  const cells = scenario === 'snow' ? [
    { cx: 180, cy: 180, r: 120, intensity: 0.9, type: 'snow' },
    { cx: 450, cy: 340, r: 160, intensity: 0.7, type: 'snow' },
    { cx: 650, cy: 520, r: 100, intensity: 0.55, type: 'snow' }
  ] : scenario === 'rain' ? [
    { cx: 280, cy: 220, r: 140, intensity: 0.5, type: 'rain' },
    { cx: 560, cy: 420, r: 170, intensity: 0.7, type: 'rain' }
  ] : scenario === 'fog' ? [
    { cx: 320, cy: 300, r: 220, intensity: 0.5, type: 'fog' },
    { cx: 550, cy: 500, r: 180, intensity: 0.6, type: 'fog' }
  ] : [];
  return (
    <g style={{ mixBlendMode: 'screen' }}>
      {cells.map((c, i) => {
        const fillId = `wcell-${c.type}-${i}`;
        return (
          <g key={i}>
            <defs>
              <radialGradient id={fillId} cx="50%" cy="50%" r="50%">
                {c.type === 'snow' && <>
                  <stop offset="0%" stopColor="#5dd6e6" stopOpacity={c.intensity * 0.35} />
                  <stop offset="70%" stopColor="#5dd6e6" stopOpacity={c.intensity * 0.08} />
                  <stop offset="100%" stopColor="#5dd6e6" stopOpacity="0" />
                </>}
                {c.type === 'rain' && <>
                  <stop offset="0%" stopColor="#88c4d6" stopOpacity={c.intensity * 0.3} />
                  <stop offset="100%" stopColor="#88c4d6" stopOpacity="0" />
                </>}
                {c.type === 'fog' && <>
                  <stop offset="0%" stopColor="#a78bfa" stopOpacity={c.intensity * 0.22} />
                  <stop offset="100%" stopColor="#a78bfa" stopOpacity="0" />
                </>}
              </radialGradient>
            </defs>
            <circle cx={c.cx} cy={c.cy} r={c.r} fill={`url(#${fillId})`} />
            {c.type === 'snow' && (
              <circle cx={c.cx} cy={c.cy} r={c.r} fill="none" stroke="rgba(93,214,230,0.2)" strokeWidth="1" strokeDasharray="3 4" />
            )}
          </g>
        );
      })}
    </g>
  );
}

function RouteLines({ route, width, height, mode, hoveredStop, onStopHover }) {
  if (!route || !route.stops) return null;
  const origStops = [...route.stops];
  const origPoints = origStops.map(s => project(s.latitude, s.longitude, width, height));
  const optPoints = [...route.stops]
    .map(s => ({ s, t: s.optimized.predicted_arrival }))
    .sort((a, b) => a.t.localeCompare(b.t))
    .map(({ s }) => project(s.latitude, s.longitude, width, height));

  const showOrig = mode === 'both' || mode === 'original';
  const showOpt  = mode === 'both' || mode === 'optimized';
  const pathStr  = (pts) => pts.map((p, i) => (i === 0 ? 'M' : 'L') + p.join(' ')).join(' ');

  return (
    <g>
      {showOrig && (
        <path d={pathStr(origPoints)} fill="none" stroke="#ff6b6b" strokeOpacity="0.9" strokeWidth="2.5" strokeDasharray="2 4" strokeLinejoin="round" />
      )}
      {showOpt && (
        <path d={pathStr(optPoints)} fill="none" stroke="#5dd6e6" strokeOpacity="0.9" strokeWidth="2.5" strokeLinejoin="round" filter="url(#glow)" />
      )}
      {route.stops.map((s, i) => {
        const [x, y] = project(s.latitude, s.longitude, width, height);
        const origOk = s.original.within_time_window;
        const color  = !origOk ? '#ff6b6b' : '#8ee68a';
        const isHovered = hoveredStop === s.stop_id;
        return (
          <g key={s.stop_id} className="stop-pin"
             onMouseEnter={() => onStopHover(s.stop_id)}
             onMouseLeave={() => onStopHover(null)}
             transform={`translate(${x},${y})`}>
            {isHovered && <circle r="14" fill={color} opacity="0.2" />}
            <circle r="9" fill="rgba(7,11,17,0.9)" stroke={color} strokeWidth="1.5" />
            <text y="3" textAnchor="middle" fill={color}>{i + 1}</text>
          </g>
        );
      })}
    </g>
  );
}

function AllRoutesOverlay({ routes, selectedId, width, height }) {
  return (
    <g opacity="0.45">
      {routes.filter(r => r.route_id !== selectedId && r.stops).map(r => {
        const pts = r.stops.map(s => project(s.latitude, s.longitude, width, height));
        const d   = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p.join(' ')).join(' ');
        return (
          <path key={r.route_id} d={d} stroke="rgba(148,178,214,0.25)" strokeWidth="1.2" fill="none" strokeDasharray="1 3" />
        );
      })}
    </g>
  );
}

function Depot({ width, height }) {
  const [x, y] = project(SIVAS_CENTER.lat, SIVAS_CENTER.lon, width, height);
  return (
    <g transform={`translate(${x},${y})`}>
      <circle r="22" fill="none" stroke="rgba(93,214,230,0.18)" strokeWidth="1" strokeDasharray="2 3" />
      <circle r="14" fill="none" stroke="rgba(93,214,230,0.3)" strokeWidth="1" />
      <rect x="-5" y="-5" width="10" height="10" fill="#5dd6e6" />
      <text y="-18" textAnchor="middle" fontFamily="var(--font-mono)" fontSize="9" fill="rgba(93,214,230,0.9)" fontWeight="600" letterSpacing="0.05em">SİVAS DEPO</text>
    </g>
  );
}

function MapTooltip({ stop, x, y }) {
  if (!stop) return null;
  const d = stop.dynamic_conditions;
  return (
    <div className="map-tooltip" style={{ left: x + 12, top: y - 8 }}>
      <div className="tt-title">
        <span className="mono">{stop.stop_id}</span>
        <span className={`badge ${stop.original.within_time_window ? 'ok' : 'critical'}`}>
          {stop.original.within_time_window ? 'ORİJİNAL: UYGUN' : 'ORİJİNAL: KAÇIRILDI'}
        </span>
      </div>
      <div className="tt-row"><span className="k">Yol türü</span><span className="v">{stop.road_type}</span></div>
      <div className="tt-row"><span className="k">Paket</span><span className="v">{stop.package_count} ad · {Number(stop.package_weight_kg).toFixed(1)} kg</span></div>
      <div className="tt-row"><span className="k">Pencere</span><span className="v">{stop.time_window_open}–{stop.time_window_close}</span></div>
      <div className="tt-row"><span className="k">Varış (orj.)</span>
        <span className="v" style={{ color: stop.original.within_time_window ? 'var(--lime)' : 'var(--red)' }}>{stop.original.predicted_arrival}</span>
      </div>
      <div className="tt-row"><span className="k">Varış (opt.)</span>
        <span className="v" style={{ color: 'var(--cyan)' }}>{stop.optimized.predicted_arrival}</span>
      </div>
      <div style={{ marginTop: 6, paddingTop: 6, borderTop: '1px solid var(--line-soft)' }}>
        <div className="tt-row"><span className="k">Hava / Yol</span>
          <span className="v">
            <span className={`cond-pill ${d.weather}`} style={{ marginRight: 4 }}>{d.weather}</span>
            <span className={`cond-pill ${d.road_surface}`}>{d.road_surface}</span>
          </span>
        </div>
        <div className="tt-row"><span className="k">Tıkanıklık</span><span className="v">{(d.congestion_ratio * 100).toFixed(0)}%</span></div>
        <div className="tt-row"><span className="k">Risk skoru</span><span className="v">{Number(d.delay_risk_score).toFixed(2)}</span></div>
      </div>
    </div>
  );
}

function MapView({ route, allRoutes, weatherVisible, weatherScenario, routeMode, onRouteMode }) {
  const wrapRef = useRef(null);
  const [size, setSize]             = useState({ width: 800, height: 600 });
  const [hoveredStop, setHoveredStop] = useState(null);
  const [mousePos, setMousePos]     = useState({ x: 0, y: 0 });
  const [showAllRoutes, setShowAllRoutes] = useState(true);
  const [showRoads, setShowRoads]   = useState(true);
  const [showWeather, setShowWeather] = useState(weatherVisible);

  useEffect(() => { setShowWeather(weatherVisible); }, [weatherVisible]);

  useEffect(() => {
    if (!wrapRef.current) return;
    const ro = new ResizeObserver(entries => {
      for (const e of entries) {
        const { width, height } = e.contentRect;
        setSize({ width, height });
      }
    });
    ro.observe(wrapRef.current);
    return () => ro.disconnect();
  }, []);

  const hoveredStopData = route && route.stops && route.stops.find(s => s.stop_id === hoveredStop);

  return (
    <div className="map-wrap" ref={wrapRef}

function Sparkline({ data, width = 80, height = 22, color = 'var(--cyan)' }) {
  const max = Math.max(...data);
  const min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / range) * height;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const area = `0,${height} ` + pts + ` ${width},${height}`;
  return (
    <svg className="spark" width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <polygon points={area} fill={color} opacity="0.12" />
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" />
    </svg>
  );
}

function TimelineGantt({ route }) {
  const [mode, setMode] = useState('compare');
  if (!route || !route.stops) return <div style={{ padding: 20, color: 'var(--text-3)', fontSize: 12 }}>Bu rota için durak detayı yok.</div>;

  const parseT = (t) => {
    if (!t || t === '??:??') return 0;
    const [h, m] = t.split(':').map(Number);
    let mins = h * 60 + m;
    if (h < 6) mins += 24 * 60;
    return mins;
  };

  const allTimes = [];
  route.stops.forEach(s => {
    allTimes.push(parseT(s.time_window_open));
    allTimes.push(parseT(s.time_window_close));
    allTimes.push(parseT(s.original.predicted_arrival));
    allTimes.push(parseT(s.optimized.predicted_arrival));
  });
  const tMin = Math.min(...allTimes.filter(t => t > 0)) - 15;
  const tMax = Math.max(...allTimes) + 15;
  const span = tMax - tMin || 1;

  const pctFor = (t) => ((parseT(t) - tMin) / span) * 100;

  const tickStep = span > 300 ? 120 : span > 120 ? 60 : 30;
  const ticks = [];
  for (let t = Math.ceil(tMin / tickStep) * tickStep; t <= tMax; t += tickStep) {
    const h = Math.floor(t / 60) % 24;
    const m = t % 60;
    ticks.push({ pct: ((t - tMin) / span) * 100, label: `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}` });
  }

  return (
    <div className="timeline">
      <div className="timeline-head">
        <div>
          <h3 style={{ margin: 0, fontSize: 13, color: 'var(--text-0)', fontWeight: 600 }}>Durak Zaman Çizelgesi</h3>
          <div style={{ fontSize: 11, color: 'var(--text-3)', marginTop: 2 }}>Yeşil = zamanında · Kırmızı = pencere kaçırıldı · Mavi şerit = teslimat penceresi</div>
        </div>
        <div className="tabs">
          <button className={mode==='compare'?'active':''} onClick={()=>setMode('compare')}>Karşılaştır</button>
          <button className={mode==='original'?'active':''} onClick={()=>setMode('original')}>Orjinal</button>
          <button className={mode==='optimized'?'active':''} onClick={()=>setMode('optimized')}>Opt.</button>
        </div>
      </div>
      <div className="gantt-axis">
        <div></div>
        <div className="ticks">{ticks.map((t, i) => <span key={i}>{t.label}</span>)}</div>
        <div></div>
      </div>
      <div className="gantt">
        {route.stops.map((s, i) => {
          const winL = pctFor(s.time_window_open);
          const winR = pctFor(s.time_window_close);
          const origL = pctFor(s.original.predicted_arrival);
          const optL  = pctFor(s.optimized.predicted_arrival);
          const serviceWpct = (s.planned_service_min / span) * 100;
          return (
            <div className="gantt-row" key={s.stop_id}>
              <div className="label">{String(i + 1).padStart(2, '0')} · {s.stop_id.slice(-5)}</div>
              <div className="track">
                <div className="window" style={{ left: `${winL}%`, width: `${winR - winL}%` }}></div>
                {(mode === 'compare' || mode === 'original') && (
                  <div className={`bar ${s.original.within_time_window ? 'ok' : 'miss'}`}
                       style={{ left: `${origL}%`, width: `${Math.max(serviceWpct, 1.2)}%`, top: mode === 'compare' ? 1 : 3, height: mode === 'compare' ? 4 : 10 }}></div>
                )}
                {(mode === 'compare' || mode === 'optimized') && (
                  <div className="bar ok" style={{ background: 'var(--cyan)', boxShadow: '0 0 4px var(--cyan-glow)', left: `${optL}%`, width: `${Math.max(serviceWpct, 1.2)}%`, top: mode === 'compare' ? 11 : 3, height: mode === 'compare' ? 4 : 10 }}></div>
                )}
              </div>
              <div className={`delay ${s.original.within_time_window ? 'ok' : 'miss'}`}>
                {s.original.within_time_window ? '✓' : `+${Number(s.original.predicted_stop_delay_min).toFixed(0)}′`}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

              <span className="metric" style={{ marginLeft: 6 }}>−{Number(imp.delay_reduction_min).toFixed(1)} dk</span> toplam gecikme
            </div>
            <div style={{ fontSize: 11, color: 'var(--text-2)', marginTop: 2 }}>
              Delay factor {Number(route.delay_factor).toFixed(3)}× · RF tahmini: {Number(route.rf_predicted_total_delay_min).toFixed(1)} dk
            </div>
          </div>
        </div>
      </div>

      <div className="actions">
        {applied ? (
          <button className="btn btn-ghost" disabled style={{ color: 'var(--lime)', borderColor: 'rgba(142,230,138,0.3)' }}>✓ Plan Uygulandı</button>
        ) : (
          <button className="btn btn-primary" onClick={onApply}>Optimize Planı Uygula</button>
        )}
        <button className="btn btn-ghost" onClick={onReOptimize}>Yeniden Hesapla</button>
      </div>

      <div style={{ display: 'flex', gap: 2, padding: '8px 16px 0', borderBottom: '1px solid var(--line)', background: 'var(--bg-1)' }}>
        {[['timeline', 'Zaman'], ['stops', 'Duraklar'], ['model', 'AI Model']].map(([k, l]) => (
          <button key={k} onClick={() => setTab(k)} style={{
            padding: '6px 10px', fontSize: 12, fontWeight: 500,
            color: tab === k ? 'var(--text-0)' : 'var(--text-2)',
            borderBottom: tab === k ? '1.5px solid var(--cyan)' : '1.5px solid transparent',
            marginBottom: -1
          }}>{l}</button>
        ))}
      </div>

      <div className="pane-body">
        {tab === 'timeline' && <TimelineGantt route={route} />}
        {tab === 'stops'    && <StopsList route={route} />}
        {tab === 'model'    && <ModelCard route={route} />}
      </div>
    </>
  );
}

function AlertsStrip({ routes, onSelect }) {
  const alerts = useMemo(() => {
    const list = [];
    routes.forEach(r => {
      if (r.severity === 'critical') {
        list.push({
          severity: 'critical',
          route_id: r.route_id,
          title: `${r.route_id}: pencere kaçırma riski`,
          desc: `${r.weather_condition.toUpperCase()} · görüş ${r.visibility_km}km · Delay factor ${Number(r.delay_factor).toFixed(2)}×`,
          time: '—',
          meta: `RF tahmini +${Number(r.rf_predicted_total_delay_min).toFixed(0)} dk gecikme`
        });
      }
      if (r.stops) {
        r.stops.forEach(s => {
          if (!s.original.within_time_window && s.dynamic_conditions.road_surface === 'icy') {
            list.push({
              severity: 'warning',
              route_id: r.route_id,
              title: `${s.stop_id}: BUZLU YOL + pencere riski`,
              desc: `${r.route_id} · ${s.road_type} · varış ${s.original.predicted_arrival} (pencere ${s.time_window_close})`,
              time: s.original.predicted_arrival,
              meta: `Risk skoru ${Number(s.dynamic_conditions.delay_risk_score).toFixed(2)} · tıkanıklık %${(s.dynamic_conditions.congestion_ratio*100).toFixed(0)}`
            });
          }
        });
      }
    });
    return list.slice(0, 8);
  }, [routes]);

  return (
    <>
      <div className="pane-header">
        <h3>Uyarı Merkezi<span className="count">{alerts.length} aktif</span></h3>
      </div>
      <div style={{ maxHeight: 280, overflowY: 'auto' }}>
        {alerts.map((a, i) => (
          <div key={i} className={`alert-item ${a.severity}`} onClick={() => onSelect(a.route_id)}>
            <div className="pin"></div>
            <div className="body">
              <div className="title">{a.title}</div>
              <div className="desc">{a.desc}</div>
              <div className="meta">{a.meta}</div>
            </div>
            <div className="time">{a.time}</div>
          </div>
        ))}
        {alerts.length === 0 && (
          <div style={{ padding: '16px 14px', color: 'var(--text-3)', fontSize: 12 }}>Aktif uyarı yok.</div>
        )}
      </div>
    </>
  );
}

function TweaksPanel({ open, onClose, tweaks, setTweaks }) {
  if (!open) return null;
  return (
    <div className="tweaks-panel">
      <div className="tp-head">
        <h4>Tweaks</h4>
        <button onClick={onClose} style={{ color: 'var(--text-2)', fontSize: 16 }}>×</button>
      </div>
      <div className="tp-body">
        <div className="tp-group">
          <div className="tp-label">Hava Senaryosu</div>
          <div className="tp-seg">
            {['snow', 'rain', 'fog', 'clear'].map(w => (
              <button key={w} className={tweaks.weather === w ? 'active' : ''} onClick={() => setTweaks({ ...tweaks, weather: w })}>
                {w === 'snow' ? 'Kar' : w === 'rain' ? 'Yağmur' : w === 'fog' ? 'Sis' : 'Açık'}
              </button>
            ))}
          </div>
        </div>
        <div className="tp-group">
          <div className="tp-label">Yoğunluk</div>
          <div className="tp-seg">
            {['compact', 'comfortable'].map(d => (
              <button key={d} className={tweaks.density === d ? 'active' : ''} onClick={() => setTweaks({ ...tweaks, density: d })}>
                {d === 'compact' ? 'Kompakt' : 'Rahat'}
              </button>
            ))}
          </div>
        </div>
        <div className="tp-group">
          <div className="tp-label">Renk Aksanı</div>
          <div className="tp-seg">
            {[['cyan', 'Cyan'], ['lime', 'Lime'], ['violet', 'Mor']].map(([k, l]) => (
              <button key={k} className={tweaks.accent === k ? 'active' : ''} onClick={() => setTweaks({ ...tweaks, accent: k })}>{l}</button>
            ))}
          </div>
        </div>
        <div className="tp-group">
          <div className="tp-label">Düzen</div>
          <div className="tp-seg">
            {[['split', 'Üçlü'], ['focus', 'Geniş Harita']].map(([k, l]) => (
              <button key={k} className={tweaks.layout === k ? 'active' : ''} onClick={() => setTweaks({ ...tweaks, layout: k })}>{l}</button>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
//  APP SHELL COMPONENTS
// ═══════════════════════════════════════════

function Clock() {
  const [t, setT] = useState(new Date());
  useEffect(() => {
    const id = setInterval(() => setT(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  const hh = String(t.getHours()).padStart(2, '0');
  const mm = String(t.getMinutes()).padStart(2, '0');
  const ss = String(t.getSeconds()).padStart(2, '0');
  return <div className="clock">{hh}:{mm}:{ss}<span className="tz">UTC+3 SİVAS</span></div>;
}

function TopBar({ activeNav, setActiveNav, criticalCount, onOpenTweaks, optimizing }) {
  return (
    <div className="topbar">
      <div className="brand">
        <div className="mark"></div>
        <span>LOJİSTİK KOMUTA</span>
        <span className="sub">v2.4 · sivas bölge</span>
      </div>
      <nav>
        {[['overview','Genel Bakış'],['winter','Kış Operasyonları'],['fleet','Filo'],['routes','Rotalar'],['reports','Raporlar']].map(([k,l]) => (
          <button key={k} className={activeNav === k ? 'active' : ''} onClick={() => setActiveNav(k)}>{l}</button>
        ))}
      </nav>
      <div className="spacer"></div>
      <div className="status-chips">
        {criticalCount > 0 && (
          <div className="chip critical"><span className="dot"></span><span>{criticalCount} kritik uyarı</span></div>
        )}
        {optimizing && (
          <div className="chip info"><span className="dot"></span><span>optimize ediliyor…</span></div>
        )}
        <div className="chip info"><span className="dot"></span><span>AI motoru aktif</span></div>
        <div className="chip"><span className="dot"></span><span>Bağlantı: güvenli</span></div>
      </div>
      <Clock />
      <button className="map-btn" onClick={onOpenTweaks} title="Tweaks" style={{ marginLeft: 8 }}>⚙</button>
    </div>
  );
}

function KpiStrip({ routes }) {
  if (!routes || routes.length === 0) return <div className="kpi-strip"></div>;
  const total = routes.length;
  const avgOrig = routes.reduce((s, r) => s + r.original_metrics.on_time_rate, 0) / total;
  const avgOpt  = routes.reduce((s, r) => s + r.optimized_metrics.on_time_rate, 0) / total;
  const totalDelayReduction = routes.reduce((s, r) => s + r.improvement.delay_reduction_min, 0);
  const totalStops = routes.reduce((s, r) => s + r.num_stops, 0);
  return (
    <div className="kpi-strip">
      <div className="kpi">
        <div className="k">Aktif Rota</div>
        <div className="v">{total}<span className="unit"> / {totalStops} durak</span></div>
        <div className="trend">{Sparkline({ data: [3,5,4,6,5,7,6], width: 60, height: 16 })}</div>
      </div>
      <div className="kpi">
        <div className="k">Zamanında (Mevcut)</div>
        <div className="v">{(avgOrig * 100).toFixed(1)}<span className="unit">%</span></div>
        <div className="trend down">↓ risk: yüksek</div>
      </div>
      <div className="kpi">
        <div className="k">Zamanında (Optimize)</div>
        <div className="v" style={{ color: 'var(--cyan)' }}>{(avgOpt * 100).toFixed(1)}<span className="unit">%</span></div>
        <div className="trend">↑ +{((avgOpt - avgOrig) * 100).toFixed(1)}pp potansiyel</div>
      </div>
      <div className="kpi">
        <div className="k">Toplam Gecikme Düşüşü</div>
        <div className="v" style={{ color: 'var(--lime)' }}>−{totalDelayReduction.toFixed(0)}<span className="unit"> dk</span></div>
        <div className="trend">≈ {(totalDelayReduction / 60).toFixed(1)} saat tasarruf</div>
      </div>
    </div>
  );
}

function Footer({ weather, routes }) {
  const tempMap = { snow: -4, rain: 8, fog: 3, clear: 11 };
  const temp = tempMap[weather] ?? 0;
  const ts = window.LOGISTICS_DATA.MODEL_STATS;
  return (
    <div className="footer">
      <div><span className="k">SİSTEM:</span><span className="v" style={{ color: 'var(--lime)' }}>OPTİMİZE EDİYOR</span></div>
      <div className="sep"></div>
      <div><span className="k">HAVA:</span><span className="v">{temp}°C · {weather.toUpperCase()}</span></div>
      <div className="sep"></div>
      <div><span className="k">ROTA:</span><span className="v">{routes.length} aktif</span></div>
      <div className="sep"></div>
      <div><span className="k">GÜVENLİK:</span><span className="v">YÜKSEK</span></div>
      <div className="right">
        <div><span className="k">MODEL:</span><span className="v">RF · R² {ts.r2}</span></div>
        <div className="sep"></div>
        <div><span className="k">MAE:</span><span className="v">{ts.mae_min} dk</span></div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════
//  MAIN APP
// ═══════════════════════════════════════════

async function fetchAndMergeRoute(routeId, weather) {
  const [detail, optResult] = await Promise.all([
    fetch(`/routes/${routeId}`).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
    fetch(`/optimize/${routeId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ weather_condition: weather }),
    }).then(r => { if (!r.ok) throw new Error(r.status); return r.json(); }),
  ]);
  return mergeToDesignFormat(detail, optResult);
}

function App() {
  const [routes,     setRoutes]     = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [filter,     setFilter]     = useState('all');
  const [activeNav,  setActiveNav]  = useState('overview');
  const [routeMode,  setRouteMode]  = useState('both');
  const [applied,    setApplied]    = useState({});
  const [loading,    setLoading]    = useState(true);
  const [optimizing, setOptimizing] = useState(false);
  const [tweaks, setTweaks] = useState(() => {
    try {
      const s = localStorage.getItem('sivas-tweaks');
      return s ? { ...TWEAK_DEFAULTS, ...JSON.parse(s) } : TWEAK_DEFAULTS;
    } catch { return TWEAK_DEFAULTS; }
  });
  const [tweaksOpen, setTweaksOpen] = useState(false);

  // Apply accent color
  useEffect(() => {
    const accentMap = {
      cyan:   { main: '#5dd6e6', soft: 'rgba(93,214,230,0.12)',  glow: 'rgba(93,214,230,0.35)' },
      lime:   { main: '#8ee68a', soft: 'rgba(142,230,138,0.12)', glow: 'rgba(142,230,138,0.35)' },
      violet: { main: '#a78bfa', soft: 'rgba(167,139,250,0.12)', glow: 'rgba(167,139,250,0.35)' },
    };
    const a = accentMap[tweaks.accent] || accentMap.violet;
    document.documentElement.style.setProperty('--cyan',      a.main);
    document.documentElement.style.setProperty('--cyan-soft', a.soft);
    document.documentElement.style.setProperty('--cyan-glow', a.glow);
  }, [tweaks.accent]);

  // Apply density
  useEffect(() => {
    if (tweaks.density === 'compact') {
      document.documentElement.style.setProperty('--space-4', '12px');
      document.documentElement.style.setProperty('--space-5', '14px');
    } else {
      document.documentElement.style.setProperty('--space-4', '16px');
      document.documentElement.style.setProperty('--space-5', '20px');
    }
  }, [tweaks.density]);

  // Save tweaks
  useEffect(() => {
    localStorage.setItem('sivas-tweaks', JSON.stringify(tweaks));
  }, [tweaks]);

  async function loadAll(weather) {
    try {
      const [modelStats, circuity, routeList] = await Promise.all([
        fetch('/stats/model').then(r => r.json()),
        fetch('/stats/circuity').then(r => r.json()),
        fetch('/routes?limit=200').then(r => r.json()),
      ]);

      window.LOGISTICS_DATA = {
        MODEL_STATS: {
          mae_min:       modelStats.mae_min       ?? '—',
          r2:            modelStats.r2            ?? '—',
          features_used: modelStats.features_used ?? 29,
          top_features:  modelStats.top_features  || {},
        },
        CIRCUITY: circuity,
      };

      const merged = await Promise.all(
        routeList.map(async r => {
          try { return await fetchAndMergeRoute(r.route_id, weather); }
          catch (e) { console.error('Route load failed:', r.route_id, e); return null; }
        })
      );

      const valid = merged.filter(Boolean);
      setRoutes(valid);

      const savedId  = localStorage.getItem('sivas-selected');
      const hasId    = valid.some(r => r.route_id === savedId);
      const newSelId = hasId ? savedId : (valid[0] && valid[0].route_id) || null;
      setSelectedId(newSelId);
      if (newSelId) localStorage.setItem('sivas-selected', newSelId);
    } catch (e) {
      console.error('loadAll failed:', e);
    }
  }

  async function reOptimizeAll(weather) {
    setOptimizing(true);
    try {
      setRoutes(prev => {
        // kick off async and update when done — capture prev in closure
        (async () => {
          const updated = await Promise.all(
            prev.map(async r => {
              try { return await fetchAndMergeRoute(r.route_id, weather); }
              catch { return r; }
            })
          );
          setRoutes(updated.filter(Boolean));
          setOptimizing(false);
        })();
        return prev; // keep current routes visible while re-optimizing
      });
    } catch {
      setOptimizing(false);
    }
  }

  async function reOptimizeSelected() {
    if (!selectedId) return;
    setOptimizing(true);
    try {
      const merged = await fetchAndMergeRoute(selectedId, tweaks.weather);
      setRoutes(prev => prev.map(r => r.route_id === selectedId ? merged : r));
    } catch (e) {
      console.error('reOptimizeSelected failed:', e);
    } finally {
      setOptimizing(false);
    }
  }

  // Initial load
  useEffect(() => {
    (async () => {
      setLoading(true);
      await loadAll(tweaks.weather);
      setLoading(false);
    })();
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  const handleTweaksChange = (newTweaks) => {
    const weatherChanged = newTweaks.weather !== tweaks.weather;
    setTweaks(newTweaks);
    if (weatherChanged && !loading) {
      reOptimizeAll(newTweaks.weather);
    }
  };

  const handleSelectRoute = (id) => {
    setSelectedId(id);
    localStorage.setItem('sivas-selected', id);
  };

  const selected      = routes.find(r => r.route_id === selectedId) || routes[0];
  const criticalCount = routes.filter(r => r.severity === 'critical').length;

  if (loading) {
    return (
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        height: '100vh', background: 'var(--bg-0)', color: 'var(--text-2)',
        fontFamily: 'var(--font-mono)', fontSize: 14, flexDirection: 'column', gap: 16,
      }}>
        <div style={{ color: 'var(--cyan)', fontSize: 22, fontWeight: 600, letterSpacing: '-0.02em' }}>LOJİSTİK KOMUTA</div>
        <div style={{ color: 'var(--text-3)' }}>Rotalar yükleniyor ve optimize ediliyor…</div>
        <div style={{ display: 'flex', gap: 6, marginTop: 4 }}>
          {[0,1,2].map(i => (
            <div key={i} style={{ width: 7, height: 7, borderRadius: '50%', background: 'var(--cyan)',
              opacity: 0.3 + i * 0.35, animation: `pulse ${1 + i * 0.3}s infinite` }} />
          ))}
        </div>
      </div>
    );
  }

  return (
    <div className="app">
      <TopBar
        activeNav={activeNav}
        setActiveNav={setActiveNav}
        criticalCount={criticalCount}
        onOpenTweaks={() => setTweaksOpen(!tweaksOpen)}
        optimizing={optimizing}
      />

      <div className={`main ${tweaks.layout === 'focus' ? 'wide-map' : ''}`}>
        {/* LEFT — Fleet list + Alerts */}
        <div className="pane">
          <FleetList
            routes={routes}
            selectedId={selectedId}
            onSelect={handleSelectRoute}
            filter={filter}
            onFilter={setFilter}
          />
          <AlertsStrip routes={routes} onSelect={handleSelectRoute} />
        </div>

        {/* CENTER — KPI strip + Map */}
        <div className="pane">
          <KpiStrip routes={routes} />
          <div style={{ flex: 1, minHeight: 0 }}>
            <MapView
              route={selected}
              allRoutes={routes}
              weatherVisible={true}
              weatherScenario={tweaks.weather}
              routeMode={routeMode}
              onRouteMode={setRouteMode}
            />
          </div>
        </div>

        {/* RIGHT — Detail pane */}
        <div className="pane">
          <DetailPane
            route={selected}
            onApply={() => setApplied({ ...applied, [selectedId]: true })}
            applied={applied[selectedId]}
            onReOptimize={reOptimizeSelected}
          />
        </div>
      </div>

      <Footer weather={tweaks.weather} routes={routes} />

      <TweaksPanel
        open={tweaksOpen}
        onClose={() => setTweaksOpen(false)}
        tweaks={tweaks}
        setTweaks={handleTweaksChange}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
